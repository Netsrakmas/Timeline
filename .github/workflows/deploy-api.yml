name: Deploy API (Cloudflare Worker)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["server/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify the Cloudflare token before doing anything
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "::error::secret CLOUDFLARE_API_TOKEN is empty or missing"; exit 1; fi
          TOKEN=$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '[:space:]')
          RESP=$(curl -sS -H "Authorization: Bearer $TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)
          echo "$RESP" | grep -q '"success":\s*true' \
            || { echo "::error::Cloudflare rejected the token (wrong value, or the token was revoked). Response: $RESP"; exit 1; }
          echo "token verified ✓"

      - name: Create D1 database if missing, wire its id into wrangler.toml
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler d1 create yearworm || echo "database already exists"
          ID=$(npx wrangler d1 list --json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const a=JSON.parse(d);const m=a.find(x=>x.name==='yearworm');console.log(m?m.uuid:'')})")
          if [ -z "$ID" ]; then echo "could not resolve database id"; exit 1; fi
          sed -i "s/PASTE_DATABASE_ID_HERE/$ID/" wrangler.toml
          echo "using database $ID"

      - name: Apply schema
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute yearworm --remote --file=schema.sql --yes

      - name: Deploy worker
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler deploy | tee deploy.log
          URL=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' deploy.log | head -1)
          echo "WORKER_URL=$URL" >> "$GITHUB_ENV"
          echo "### Worker deployed: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test /health
        run: |
          echo "worker url: $WORKER_URL"
          curl -sS --fail "$WORKER_URL/health" && echo && echo "HEALTH OK"

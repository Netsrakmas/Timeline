<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tijdlijn — music timeline game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0E1015; --surface:#191D27; --surface-2:#222734; --line:#2E3442;
    --amber:#F4B740; --pink:#FF4D7D; --cyan:#4DD4FF;
    --text:#ECEEF3; --muted:#888F9E; --good:#46E3A0; --bad:#FF5C5C;
    --r:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(244,183,64,.10), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(255,77,125,.10), transparent 55%),
      var(--ink);
    color:var(--text);
    font-family:"Space Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #app{max-width:560px; margin:0 auto; padding:22px 18px 40px; min-height:100%;}
  .display{font-family:"Anton",sans-serif; font-weight:400; letter-spacing:.5px; line-height:.95;}
  .eyebrow{font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--amber); font-weight:700;}
  .muted{color:var(--muted);}
  h1.brand{font-family:"Anton"; font-size:clamp(40px,13vw,64px); margin:6px 0 2px; letter-spacing:1px;
    background:linear-gradient(180deg,#fff, #cdd2dd); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .tag{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.5;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:18px;}
  .card + .card{margin-top:14px;}
  label.fld{display:block; font-size:13px; color:var(--muted); margin:0 0 7px; letter-spacing:.02em;}
  input[type=text]{
    width:100%; background:var(--ink); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:13px 14px; font:inherit; font-size:15px; outline:none;
  }
  input[type=text]:focus{border-color:var(--amber);}
  .row{display:flex; gap:10px; align-items:center;}
  .row.wrap{flex-wrap:wrap;}
  button{font:inherit; cursor:pointer; border:none; border-radius:11px; font-weight:700; letter-spacing:.01em;}
  .btn{padding:14px 16px; background:var(--surface-2); color:var(--text); border:1px solid var(--line); width:100%;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:linear-gradient(180deg,#FFC857,var(--amber)); color:#221a05; border:none;}
  .btn.pink{background:linear-gradient(180deg,#FF6E97,var(--pink)); color:#2a0010; border:none;}
  .btn.ghost{background:transparent;}
  .btn.sm{padding:10px 12px; font-size:13px; width:auto;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .hint{font-size:12.5px; color:var(--muted); margin-top:9px; line-height:1.55;}
  .codebox{font-family:ui-monospace,Menlo,monospace; font-size:12px; background:var(--ink); border:1px dashed var(--line);
    border-radius:8px; padding:9px 11px; color:var(--cyan); word-break:break-all; margin-top:7px;}
  .pill{display:inline-flex; align-items:center; gap:7px; font-size:12px; padding:6px 11px; border-radius:99px;
    border:1px solid var(--line); background:var(--surface);}
  .dot{width:8px; height:8px; border-radius:99px; background:var(--muted);}
  .dot.on{background:var(--good); box-shadow:0 0 10px var(--good);}
  .players-list{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .players-list .row input{flex:1;}
  .iconbtn{width:44px; height:44px; flex:0 0 auto; display:grid; place-items:center; font-size:18px;}
  .seg{display:flex; gap:8px;}
  .seg button{flex:1; padding:11px; background:var(--surface-2); border:1px solid var(--line); color:var(--muted);}
  .seg button.sel{background:var(--amber); color:#201804; border-color:transparent;}

  /* GAME */
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .turn-name{font-family:"Anton"; font-size:30px; line-height:1;}
  .scorebar{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
  .score-chip{font-size:11.5px; padding:4px 9px; border-radius:99px; border:1px solid var(--line); color:var(--muted);}
  .score-chip.active{border-color:var(--amber); color:var(--amber);}

  .stage{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:22px 18px; text-align:center; margin-bottom:16px;}
  .eq{display:inline-flex; gap:4px; align-items:flex-end; height:34px; margin-bottom:10px;}
  .eq span{width:5px; background:linear-gradient(180deg,var(--amber),var(--pink)); border-radius:3px; animation:eq 1s ease-in-out infinite;}
  .eq span:nth-child(2){animation-delay:.15s} .eq span:nth-child(3){animation-delay:.3s}
  .eq span:nth-child(4){animation-delay:.45s} .eq span:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:9px}50%{height:34px}}
  .eq.paused span{animation-play-state:paused; height:9px;}
  .stage h2{font-family:"Anton"; font-weight:400; font-size:22px; margin:4px 0 2px; letter-spacing:.5px;}
  .stage p{margin:0; color:var(--muted); font-size:13.5px;}

  .tl-label{font-size:12px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; margin:0 0 8px;}
  .timeline{display:flex; align-items:stretch; gap:0; overflow-x:auto; padding:4px 2px 12px; -webkit-overflow-scrolling:touch;}
  .timeline::-webkit-scrollbar{height:6px;} .timeline::-webkit-scrollbar-thumb{background:var(--line); border-radius:9px;}
  .slot{flex:0 0 auto; width:62px; align-self:stretch; min-height:96px; margin:0 3px; border-radius:12px;
    border:1.5px dashed var(--line); background:rgba(255,255,255,.015); color:var(--muted);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 4px; transition:.15s;}
  .slot.active{border-color:var(--cyan); color:var(--cyan); background:rgba(77,212,255,.07);}
  .slot.active:active{background:rgba(77,212,255,.18);}
  .slot .ins{font-size:18px;}
  .slot .rng{font-size:10px; line-height:1.2; text-align:center;}
  .placed{flex:0 0 auto; width:104px; min-height:96px; border-radius:12px; background:var(--surface-2);
    border:1px solid var(--line); padding:10px 9px; display:flex; flex-direction:column; justify-content:space-between;}
  .placed .yr{font-family:"Anton"; font-size:30px; color:var(--amber); line-height:.9;}
  .placed .ti{font-size:11px; line-height:1.25; max-height:42px; overflow:hidden;}
  .placed .ar{font-size:10px; color:var(--muted); margin-top:2px;}
  .empty-tl{color:var(--muted); font-size:13px; padding:14px 2px;}

  .controls{display:flex; gap:10px; margin-top:6px;}
  .controls .btn{flex:1;}

  /* overlay */
  .overlay{position:fixed; inset:0; background:rgba(8,9,12,.72); backdrop-filter:blur(6px); display:none;
    align-items:center; justify-content:center; padding:22px; z-index:50;}
  .overlay.show{display:flex;}
  .sheet{width:100%; max-width:420px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:24px; text-align:center;
    animation:pop .22s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes pop{from{transform:scale(.9); opacity:0}to{transform:scale(1); opacity:1}}
  .verdict{font-family:"Anton"; font-size:34px; letter-spacing:1px; margin-bottom:4px;}
  .verdict.good{color:var(--good);} .verdict.bad{color:var(--bad);}
  .reveal-yr{font-family:"Anton"; font-size:72px; line-height:.9; margin:10px 0 2px;}
  .reveal-ti{font-size:17px; font-weight:700;}
  .reveal-ar{color:var(--muted); margin:2px 0 18px;}
  .winner-emoji{font-size:54px;}
  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:var(--bad); color:#fff;
    padding:11px 16px; border-radius:11px; font-size:13.5px; max-width:90%; text-align:center; z-index:60;
    box-shadow:0 8px 30px rgba(0,0,0,.4); display:none;}
  .toast.show{display:block;}
  #errbar{display:none; position:fixed; top:0; left:0; right:0; z-index:70; background:#3A1418; color:#FFD9D9;
    border-bottom:1px solid var(--bad); padding:14px 16px; font-size:12.5px; line-height:1.55; white-space:pre-wrap; cursor:pointer;}
  .footnote{margin-top:26px; font-size:11.5px; color:var(--muted); text-align:center; line-height:1.6;}
  a{color:var(--cyan);}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<div id="errbar" onclick="this.style.display='none'"></div>

<script>
"use strict";

/* ---------- tiny storage (degrades gracefully in sandboxes) ---------- */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};

/* ---------- config ---------- */
const SCOPES = "user-read-private user-read-playback-state user-modify-playback-state playlist-read-private playlist-read-collaborative";
const REDIRECT_URI = window.location.origin + window.location.pathname;

/* ---------- app state ---------- */
const S = {
  token: null,
  expiresAt: 0,
  me: null,
  devices: [],
  deviceId: null,
  deck: [],          // {id,uri,name,artist,year}
  used: new Set(),
  players: [],       // {name, timeline:[card]}
  turn: 0,
  target: 10,
  current: null,     // hidden card in play
  pendingSlot: null,
  playing: false,
};

/* ---------- PKCE helpers ---------- */
function randString(n){
  const a = new Uint8Array(n); crypto.getRandomValues(a);
  return Array.from(a, b => ("0"+(b&0xff).toString(16)).slice(-2)).join("");
}
function b64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
async function challengeFrom(verifier){
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return b64url(digest);
}

async function login(){
  const clientId = (val("clientId")||"").trim();
  if(!clientId){ toast("Paste your Spotify Client ID first."); return; }
  store.set("hs_client", clientId);
  const verifier = randString(48);
  store.set("hs_verifier", verifier);
  const challenge = await challengeFrom(verifier);
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge,
  });
  window.location = "https://accounts.spotify.com/authorize?" + params.toString();
}

async function exchangeCode(code){
  const clientId = store.get("hs_client");
  const verifier = store.get("hs_verifier");
  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: "authorization_code",
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier,
  });
  const r = await fetch("https://accounts.spotify.com/api/token", {
    method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body
  });
  if(!r.ok){ toast("Login failed — check the Client ID and redirect URI."); return false; }
  const d = await r.json();
  saveToken(d);
  return true;
}

async function refresh(){
  const clientId = store.get("hs_client");
  const rt = store.get("hs_refresh");
  if(!rt) return false;
  const body = new URLSearchParams({ client_id:clientId, grant_type:"refresh_token", refresh_token:rt });
  const r = await fetch("https://accounts.spotify.com/api/token",{
    method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body
  });
  if(!r.ok){ return false; }
  saveToken(await r.json());
  return true;
}

function saveToken(d){
  S.token = d.access_token;
  S.expiresAt = Date.now() + (d.expires_in-60)*1000;
  store.set("hs_token", d.access_token);
  store.set("hs_exp", String(S.expiresAt));
  if(d.refresh_token) store.set("hs_refresh", d.refresh_token);
}

async function ensureToken(){
  if(S.token && Date.now() < S.expiresAt) return true;
  const cached = store.get("hs_token"), exp = parseInt(store.get("hs_exp")||"0",10);
  if(cached && Date.now() < exp){ S.token = cached; S.expiresAt = exp; return true; }
  return await refresh();
}

/* ---------- Spotify API ---------- */
async function api(path, opts={}){
  await ensureToken();
  const r = await fetch("https://api.spotify.com/v1"+path, {
    ...opts,
    headers:{ "Authorization":"Bearer "+S.token, "Content-Type":"application/json", ...(opts.headers||{}) }
  });
  if(r.status===401){ if(await refresh()){ return api(path,opts); } }
  return r;
}
async function getMe(){ const r = await api("/me"); if(r.ok) S.me = await r.json(); return S.me; }
async function getDevices(){
  const r = await api("/me/player/devices");
  if(r.ok){ const d = await r.json(); S.devices = d.devices||[]; }
  return S.devices;
}
async function transferTo(id){
  await api("/me/player",{ method:"PUT", body: JSON.stringify({ device_ids:[id], play:false }) });
}
async function playTrack(uri){
  if(!S.deviceId){ toast("No Spotify device — open Spotify and play/pause once."); return false; }
  const r = await api("/me/player/play?device_id="+S.deviceId, {
    method:"PUT", body: JSON.stringify({ uris:[uri] })
  });
  if(r.status===404){ toast("Device went idle. Open Spotify, then tap Replay."); return false; }
  if(r.status===403){ toast("Playback control needs Spotify Premium."); return false; }
  S.playing = true;
  return true;
}
async function pausePlayback(){
  await api("/me/player/pause"+(S.deviceId?("?device_id="+S.deviceId):""), { method:"PUT" });
  S.playing = false;
}

function parsePlaylistId(input){
  const s = (input||"").trim();
  let m = s.match(/playlist[/:]([A-Za-z0-9]+)/);
  if(m) return m[1];
  if(/^[A-Za-z0-9]{18,}$/.test(s)) return s;
  return null;
}
async function loadPlaylist(input){
  const id = parsePlaylistId(input);
  if(!id){ showError("That doesn't look like a playlist link or ID."); return false; }
  const cards = [];
  // Feb 2026 Spotify API: /tracks renamed to /items; each entry's track is now .item
  let url = "/playlists/"+id+"/items?limit=100";
  let guard = 0, rawCount = 0, noYear = 0;
  while(url && guard++ < 20){
    const r = await api(url);
    if(!r.ok){
      let body=""; try{ body = await r.text(); }catch(e){}
      showError("Spotify returned "+r.status+" reading the playlist.\n"+body.slice(0,200)
        +(r.status===403 ? "\n\n403 now usually means it isn't a playlist you own — only your own playlists work." : ""));
      return false;
    }
    const d = await r.json();
    const items = d.items||[];
    rawCount += items.length;
    for(const it of items){
      const t = it.item || it.track;   // .item is the new (Feb 2026) field name
      if(!t || !t.id) continue;
      if(t.type && t.type!=="track"){ continue; }   // skip podcast episodes
      const rd = t.album && t.album.release_date;
      if(!rd){ noYear++; continue; }
      const year = parseInt(String(rd).slice(0,4),10);
      if(!year){ noYear++; continue; }
      cards.push({ id:t.id, uri:t.uri, name:t.name||"Unknown",
        artist:(t.artists||[]).map(a=>a.name).join(", "), year });
    }
    url = d.next ? d.next.replace("https://api.spotify.com/v1","") : null;
  }
  const seen = new Set(); S.deck = cards.filter(c => !seen.has(c.id) && seen.add(c.id));
  if(S.deck.length===0){
    showError("Read "+rawCount+" item(s) from the playlist but kept 0 "
      +"("+noYear+" had no usable release year; local files are skipped). "
      +(rawCount===0 ? "0 items means it isn't a playlist you own/collaborate on — make your own deck." : ""));
  }
  return S.deck.length > 0;
}

/* ---------- game logic ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function drawCard(){
  const avail = S.deck.filter(c => !S.used.has(c.id) && !inAnyTimeline(c.id));
  if(avail.length===0) return null;
  return avail[Math.floor(Math.random()*avail.length)];
}
function inAnyTimeline(id){ return S.players.some(p => p.timeline.some(c => c.id===id)); }

function startGame(){
  shuffle(S.deck);
  // seed each player with one freebie card so the first placement has a reference point
  S.players.forEach(p=>{
    const c = drawCard();
    if(c){ S.used.add(c.id); p.timeline = [c]; }
  });
  S.turn = 0;
  nextTurn();
  renderGame();
}

async function nextTurn(){
  S.pendingSlot = null;
  const c = drawCard();
  if(!c){ overlayGameOver(true); return; }
  S.current = c;
  renderGame();
  await playTrack(c.uri);
  renderGame();
}

function sortedTimeline(p){ return [...p.timeline].sort((a,b)=>a.year-b.year); }

function slotCorrect(p, idx){
  const tl = sortedTimeline(p);
  const y = S.current.year;
  const left = idx>0 ? tl[idx-1].year : -Infinity;
  const right = idx<tl.length ? tl[idx].year : Infinity;
  return y >= left && y <= right;
}

async function chooseSlot(idx){
  if(!S.current) return;
  const p = S.players[S.turn];
  const correct = slotCorrect(p, idx);
  await pausePlayback();
  if(correct){
    p.timeline.push(S.current);
    p.timeline.sort((a,b)=>a.year-b.year);
  }
  S.used.add(S.current.id);
  overlayReveal(correct, p);
}

function advance(){
  closeOverlay();
  const p = S.players[S.turn];
  if(p.timeline.length >= S.target){ overlayGameOver(false, p); return; }
  S.turn = (S.turn+1) % S.players.length;
  nextTurn();
}

/* ---------- rendering ---------- */
const app = () => document.getElementById("app");
function val(id){ const el=document.getElementById(id); return el?el.value:""; }
function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

let toastTimer;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 3400);
}
function closeOverlay(){ document.getElementById("overlay").classList.remove("show"); }
function showError(msg){
  const e=document.getElementById("errbar");
  e.textContent = "⚠ "+msg+"\n\n(tap to dismiss)";
  e.style.display="block";
  window.scrollTo(0,0);
  console.error("[Tijdlijn]", msg);
}

function renderSetup(){
  const connected = !!S.me;
  const premium = !S.me || S.me.product !== "free";  // product field removed Feb 2026; only flag explicit "free"
  const dev = S.deviceId ? S.devices.find(d=>d.id===S.deviceId) : null;
  app().innerHTML = `
    <div class="eyebrow">drop the needle · guess the year</div>
    <h1 class="brand">TIJDLIJN</h1>
    <div class="tag">Hear a track, slot it into your timeline by release year. Build a run of ${S.target} and you win. Music plays through your own Spotify.</div>

    <div class="card">
      <div class="eyebrow" style="color:var(--cyan)">step 1 · connect</div>
      <div style="height:10px"></div>
      ${connected ? `
        <div class="row" style="justify-content:space-between">
          <div class="pill"><span class="dot on"></span> ${esc(S.me.display_name||"Connected")}</div>
          <span class="pill" style="${premium?'':'color:var(--bad);border-color:var(--bad)'}">${premium?'Connected ✓':'Free account?'}</span>
        </div>
      ` : `
        <label class="fld" for="clientId">Spotify Client ID</label>
        <input id="clientId" type="text" placeholder="paste from developer dashboard" value="${esc(store.get('hs_client')||'')}" />
        <button class="btn primary" style="margin-top:12px" onclick="login()">Connect Spotify</button>
        <div class="hint">One-time setup: create an app at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com</a>, copy its <b>Client ID</b>, and add this exact <b>Redirect URI</b>:</div>
        <div class="codebox">${esc(REDIRECT_URI)}</div>
      `}
    </div>

    ${connected ? `
    <div class="card">
      <div class="eyebrow" style="color:var(--cyan)">step 2 · playback device</div>
      <div style="height:10px"></div>
      <div class="row" style="justify-content:space-between">
        <div class="muted" style="font-size:13px">${dev?('Playing on <b style="color:var(--text)">'+esc(dev.name)+'</b>'):'Pick the phone running Spotify'}</div>
        <button class="btn sm ghost" onclick="refreshDevices()">↻ Refresh</button>
      </div>
      <div id="deviceList" style="margin-top:10px"></div>
      <div class="hint">No devices? Open the Spotify app and play then pause any song so it registers.</div>
    </div>

    <div class="card">
      <div class="eyebrow" style="color:var(--cyan)">step 3 · the deck</div>
      <div style="height:10px"></div>
      <label class="fld" for="plUrl">Spotify playlist link or ID</label>
      <input id="plUrl" type="text" placeholder="https://open.spotify.com/playlist/..." value="${esc(store.get('hs_pl')||'')}" />
      <div class="hint">Tip: use a playlist of <b>original releases</b> (not a “greatest hits”/remaster comp) — the year comes from the album date.</div>
    </div>

    <div class="card">
      <div class="eyebrow" style="color:var(--cyan)">step 4 · players</div>
      <div style="height:10px"></div>
      <div class="players-list" id="players"></div>
      <button class="btn ghost sm" style="margin-top:10px" onclick="addPlayer()">+ Add player</button>
      <div style="height:16px"></div>
      <label class="fld">Cards needed to win</label>
      <div class="seg" id="targetSeg">
        ${[6,8,10].map(n=>`<button class="${S.target===n?'sel':''}" onclick="setTarget(${n})">${n}</button>`).join("")}
      </div>
    </div>

    <button class="btn pink" style="margin-top:16px; font-size:16px; padding:16px" onclick="onStart()">▶ Start game</button>
    ` : ``}

    <div class="footnote">Self-hosted · plays via Spotify Connect · for personal use</div>
  `;
  if(connected){ renderDevices(); renderPlayers(); }
}

function renderDevices(){
  const box = document.getElementById("deviceList"); if(!box) return;
  if(S.devices.length===0){ box.innerHTML = `<div class="muted" style="font-size:13px">No active devices found.</div>`; return; }
  box.innerHTML = S.devices.map(d=>`
    <button class="btn ${S.deviceId===d.id?'primary':''}" style="margin-bottom:8px; text-align:left" onclick="pickDevice('${d.id}')">
      ${S.deviceId===d.id?'● ':''}${esc(d.name)} <span class="muted" style="font-weight:400">· ${esc(d.type)}</span>
    </button>`).join("");
}

function renderPlayers(){
  const box = document.getElementById("players"); if(!box) return;
  if(S.players.length===0) S.players=[{name:"Player 1",timeline:[]}];
  box.innerHTML = S.players.map((p,i)=>`
    <div class="row">
      <input type="text" value="${esc(p.name)}" oninput="renamePlayer(${i}, this.value)" />
      ${S.players.length>1?`<button class="btn iconbtn ghost" onclick="removePlayer(${i})">✕</button>`:``}
    </div>`).join("");
}

function renderGame(){
  const p = S.players[S.turn];
  const tl = sortedTimeline(p);
  // build interleaved slots + cards
  let slotsHTML = "";
  const live = !!S.current;
  for(let i=0;i<=tl.length;i++){
    const left = i>0 ? tl[i-1].year : null;
    const right = i<tl.length ? tl[i].year : null;
    const rng = left===null ? `before ${right}` : right===null ? `after ${left}` : `${left}–${right}`;
    slotsHTML += `<button class="slot ${live?'active':''}" ${live?`onclick="chooseSlot(${i})"`:'disabled'}>
        <span class="ins">+</span><span class="rng">${rng}</span></button>`;
    if(i<tl.length){
      slotsHTML += `<div class="placed"><div class="yr">${tl[i].year}</div>
        <div><div class="ti">${esc(tl[i].name)}</div><div class="ar">${esc(tl[i].artist)}</div></div></div>`;
    }
  }

  app().innerHTML = `
    <div class="topbar">
      <div>
        <div class="eyebrow">now placing</div>
        <div class="turn-name">${esc(p.name)}</div>
      </div>
      <button class="btn sm ghost" onclick="confirmQuit()">Quit</button>
    </div>
    <div class="scorebar">
      ${S.players.map((pp,i)=>`<span class="score-chip ${i===S.turn?'active':''}">${esc(pp.name)} · ${pp.timeline.length}/${S.target}</span>`).join("")}
    </div>

    <div class="stage" style="margin-top:14px">
      <div class="eq ${S.playing?'':'paused'}"><span></span><span></span><span></span><span></span><span></span></div>
      <h2>${live?'Mystery track is playing':'…'}</h2>
      <p>Listen, then drop it into your timeline where it belongs.</p>
    </div>

    <div class="controls">
      <button class="btn" onclick="replay()">↻ Replay</button>
      <button class="btn" onclick="pausePlayback()">❚❚ Pause</button>
    </div>

    <div style="height:18px"></div>
    <p class="tl-label">${esc(p.name)}’s timeline — tap a gap to place</p>
    ${tl.length? `<div class="timeline">${slotsHTML}</div>` : `<div class="empty-tl">No cards yet.</div>`}
    <div class="footnote">Older ◄———————————————► Newer</div>
  `;
}

function overlayReveal(correct, p){
  const c = S.current;
  const sheet = document.getElementById("sheet");
  sheet.innerHTML = `
    <div class="verdict ${correct?'good':'bad'}">${correct?'NICE!':'NOPE'}</div>
    <div class="muted" style="font-size:13px">${correct?'Card goes to '+esc(p.name):'Card is discarded'}</div>
    <div class="reveal-yr" style="color:${correct?'var(--good)':'var(--bad)'}">${c.year}</div>
    <div class="reveal-ti">${esc(c.name)}</div>
    <div class="reveal-ar">${esc(c.artist)}</div>
    <button class="btn primary" onclick="advance()">Next turn →</button>
  `;
  document.getElementById("overlay").classList.add("show");
}

function overlayGameOver(deckEmpty, winner){
  let w = winner;
  if(!w){ w = [...S.players].sort((a,b)=>b.timeline.length-a.timeline.length)[0]; }
  const sheet = document.getElementById("sheet");
  sheet.innerHTML = `
    <div class="winner-emoji">🏆</div>
    <div class="verdict good" style="margin-top:6px">${esc(w.name)} WINS</div>
    <div class="muted" style="font-size:14px; margin:6px 0 4px">${deckEmpty?'Deck ran out — most cards takes it.':''}</div>
    <div style="margin:14px 0 18px">${S.players.map(p=>`<div style="font-size:14px; margin:3px 0">${esc(p.name)} — <b>${p.timeline.length}</b></div>`).join("")}</div>
    <button class="btn pink" onclick="playAgain()">Play again</button>
    <button class="btn ghost" style="margin-top:8px" onclick="backToSetup()">Change setup</button>
  `;
  document.getElementById("overlay").classList.add("show");
}

/* ---------- UI actions ---------- */
async function refreshDevices(){ await getDevices(); if(!S.deviceId && S.devices[0]) S.deviceId=S.devices[0].id; renderSetup(); }
function pickDevice(id){ S.deviceId=id; transferTo(id); renderSetup(); }
function addPlayer(){ S.players.push({name:"Player "+(S.players.length+1),timeline:[]}); renderPlayers(); }
function removePlayer(i){ S.players.splice(i,1); renderPlayers(); }
function renamePlayer(i,v){ S.players[i].name=v; }
function setTarget(n){ S.target=n; renderSetup(); }

async function onStart(){
  if(!S.deviceId){ toast("Pick a playback device first."); return; }
  const plInput = val("plUrl");
  store.set("hs_pl", plInput);
  toast("Loading deck…");
  const ok = await loadPlaylist(plInput);
  if(!ok){ return; }
  if(S.deck.length < S.players.length*S.target){
    toast("Heads up: small playlist for "+S.target+"-card games.");
  }
  S.used = new Set();
  startGame();
}

function replay(){ if(S.current) playTrack(S.current.uri).then(()=>renderGame()); }
function confirmQuit(){ if(confirm("Quit this game and return to setup?")) backToSetup(); }
function playAgain(){
  closeOverlay();
  S.players.forEach(p=>p.timeline=[]);
  S.used=new Set(); S.current=null;
  startGame();
}
function backToSetup(){ closeOverlay(); S.current=null; renderSetup(); }

/* ---------- boot ---------- */
async function boot(){
  const params = new URLSearchParams(window.location.search);
  if(params.get("code")){
    const ok = await exchangeCode(params.get("code"));
    history.replaceState({}, "", REDIRECT_URI); // clean the URL
    if(ok){ await getMe(); await refreshDevices(); }
  } else if(params.get("error")){
    history.replaceState({}, "", REDIRECT_URI);
    toast("Spotify login was cancelled.");
  } else if(await ensureToken()){
    await getMe(); await refreshDevices();
  }
  renderSetup();
}
boot();
</script>
</body>
</html>

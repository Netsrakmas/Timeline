<style>
  :root{
    --ink:#02040A; --surface:#101426; --surface-2:#131A35; --line:#2A3054;
    --gold:#FFC24B; --cyan:#8CEBFF; --violet:#B36BFF;
    --text:#F9F2FF; --muted:#A6ABD1; --good:#49F1A0; --bad:#FF5E8A;
    --glow-gold:rgba(255,194,75,.18);
    --glow-cyan:rgba(140,235,255,.12);
    --r:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  /* The decorative glows live on a fixed, viewport-sized layer ("stage lights").
     On the body they were sized/positioned against the DOCUMENT height, so they
     tiled on long pages and jumped whenever the content grew or shrank
     (add/remove player, resume card). A fixed layer is anchored to the screen. */
  body{
    margin:0; min-height:100%;
    background:#03050D;
    color:var(--text);
    font-family:"Space Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(900px 420px at 50% -8%, var(--glow-gold), transparent 58%),
      radial-gradient(800px 380px at 50% 115%, var(--glow-cyan), transparent 50%),
      radial-gradient(520px 260px at 12% 18%, rgba(255,194,75,.09), transparent 36%),
      linear-gradient(180deg, #03050D 0%, #0B1020 52%, #02040A 100%);
  }
  #app{max-width:560px; margin:0 auto; min-height:100%;
    padding:max(22px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(40px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));}
  .display{font-family:"Anton",sans-serif; font-weight:400; letter-spacing:.5px; line-height:.95;}
  .eyebrow{font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); font-weight:700;}
  .muted{color:var(--muted);}
  h1.brand{font-family:"Anton"; font-size:clamp(40px,13vw,64px); margin:6px 0 2px; letter-spacing:1px;
    background:linear-gradient(180deg,#ffffff 0%, #FFE0A3 52%, var(--cyan) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 18px rgba(255,194,75,.08);}
  .tag{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.5;}
  .card{background:linear-gradient(180deg, #13182E, #0D1121); border:1px solid var(--line); border-radius:var(--r); padding:18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 10px 26px rgba(0,0,0,.35);}
  .card + .card{margin-top:14px;}
  label.fld{display:block; font-size:13px; color:var(--muted); margin:0 0 7px; letter-spacing:.02em;}
  input[type=text], input[type=number]{
    width:100%; background:var(--ink); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:13px 14px; font:inherit; font-size:15px; outline:none;
  }
  input[type=text]:focus, input[type=number]:focus{border-color:var(--gold);}
  .row{display:flex; gap:10px; align-items:center;}
  .row.wrap{flex-wrap:wrap;}
  button{font:inherit; cursor:pointer; border:none; border-radius:11px; font-weight:700; letter-spacing:.01em;}
  .btn{padding:14px 16px; background:var(--surface-2); color:var(--text); border:1px solid var(--line); width:100%;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:linear-gradient(180deg,#FFDE93,var(--gold)); color:#2A1A00; border:none;
    box-shadow:0 10px 22px rgba(255,194,75,.24);}
  .btn.pink{background:linear-gradient(180deg,#A9F1FF,var(--cyan)); color:#002A38; border:none;
    box-shadow:0 10px 22px rgba(140,235,255,.18);}
  .btn.ghost{background:transparent;}
  .btn:hover{filter:brightness(1.04);}
  .btn.sm{padding:10px 12px; font-size:13px; width:auto; min-height:40px;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .hint{font-size:12.5px; color:var(--muted); margin-top:9px; line-height:1.55;}
  .pill{display:inline-flex; align-items:center; gap:7px; font-size:12px; padding:6px 11px; border-radius:99px;
    border:1px solid var(--line); background:var(--surface);}
  .dot{width:8px; height:8px; border-radius:99px; background:var(--muted);}
  .dot.on{background:var(--good); box-shadow:0 0 10px var(--good);}
  .players-list{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .players-list .row input{flex:1;}
  .iconbtn{width:44px; height:44px; padding:0; flex:0 0 auto; display:grid; place-items:center; font-size:18px;}
  /* in input rows the ✕ stretches to exactly the input's height, so the two
     rounded rects align pixel-perfect instead of the 44px button floating */
  .row:has(> input) { align-items:stretch; }
  .row:has(> input) .iconbtn{ height:auto; }
  /* a search result that's in the deck — instant feedback where you tapped */
  .btn.added{background:linear-gradient(180deg,#FFDE93,var(--gold)); color:#2A1A00; border:none; opacity:1; cursor:default;}
  /* the start button rides along while you scroll the (long) setup page */
  .startbar{position:sticky; bottom:calc(10px + env(safe-area-inset-bottom)); z-index:5; margin-top:16px;}
  .startbar .btn{box-shadow:0 6px 24px rgba(0,0,0,.55), 0 10px 22px rgba(140,235,255,.18);}
  .diffs{display:flex; flex-direction:column; gap:8px;}
  .diff{display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:13px 15px; border-radius:12px; background:var(--surface-2); border:1px solid var(--line);
    color:var(--text); width:100%; text-align:left; font:inherit; font-weight:700;}
  .diff .dname{font-size:15px;}
  .diff .dcards{flex:0 0 auto; font-size:12px; color:var(--muted); letter-spacing:.04em; font-weight:500;}
  .diff.sel{background:linear-gradient(180deg,#FFDE93,var(--gold)); color:#2A1A00; border-color:transparent;
    box-shadow:0 8px 20px rgba(255,194,75,.22);}
  .diff.sel .dcards{color:#2A1A00; opacity:.85;}

  /* DECK PICKER */
  .deck-list{display:flex; flex-direction:column; gap:8px;}
  .deck{display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:12px;
    background:var(--surface-2); border:1px solid var(--line); color:var(--text); width:100%; text-align:left; font:inherit;}
  .deck .demoji{font-size:22px; flex:0 0 auto;}
  .deck .dmeta{flex:1; min-width:0;}
  .deck .dt{display:block; font-size:15px; font-weight:700; line-height:1.25;}
  .deck .dd{display:block; font-size:12px; color:var(--muted); font-weight:500; margin-top:3px; line-height:1.3;}
  .deck .dn{flex:0 0 auto; font-size:12px; color:var(--muted); font-weight:500;}
  .deck.sel{background:linear-gradient(180deg,#FFDE93,var(--gold)); color:#2A1A00; border-color:transparent;
    box-shadow:0 8px 20px rgba(255,194,75,.22);}
  .deck.sel .dd, .deck.sel .dn{color:#2A1A00; opacity:.85;}
  /* deck carousel — side-scrollable pages of 6 chips (2 cols × 3 rows) */
  .deck-carousel{display:flex; overflow-x:auto; scroll-snap-type:x mandatory; gap:14px;
    -webkit-overflow-scrolling:touch; padding:2px 0 4px; scrollbar-width:none;}
  .deck-carousel::-webkit-scrollbar{display:none;}
  .deck-page{flex:0 0 100%; scroll-snap-align:start; display:grid; grid-template-columns:1fr 1fr; gap:8px; align-content:start;}
  .car-dots{display:flex; justify-content:center; gap:6px; margin-top:11px;}
  .car-dot{width:6px; height:6px; border-radius:99px; background:var(--line); transition:.2s;}
  .car-dot.on{background:var(--gold); width:18px;}
  .dchip{display:flex; align-items:flex-start; gap:8px; padding:10px 11px; border-radius:12px; min-height:66px;
    background:var(--surface-2); border:1px solid var(--line); color:var(--text); width:100%; text-align:left; font:inherit; min-width:0;}
  .dchip:active{transform:translateY(1px);}
  .dchip .de{font-size:17px; flex:0 0 auto; margin-top:1px;}
  .dchip .dm{min-width:0; flex:1;}
  .dchip .dn2{display:block; font-weight:700; font-size:13px; line-height:1.25;}
  .dchip .dc2{display:block; font-size:10.5px; color:var(--muted); margin-top:3px; line-height:1.3;}
  .dchip.sel{background:linear-gradient(180deg,#FFDE93,var(--gold)); color:#2A1A00; border-color:transparent;
    box-shadow:0 6px 16px rgba(255,194,75,.22);}
  .dchip.sel .dc2{color:#2A1A00; opacity:.82;}

  /* DECK BUILDER */
  .res-list{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
  .res-row{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px;}
  .res-meta{flex:1; min-width:0;}
  .res-ti{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .res-ar{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .res-yr{flex:0 0 auto; font-family:"Anton"; font-size:18px; color:var(--cyan); width:54px; text-align:center;}
  .song-row{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px;}
  .song-row input.yr{width:74px; flex:0 0 auto; text-align:center; font-family:"Anton"; font-size:18px;
    color:var(--gold); padding:8px 6px; -moz-appearance:textfield;}
  .song-row input.yr::-webkit-outer-spin-button, .song-row input.yr::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}

  /* GAME */
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .turn-name{font-family:"Anton"; font-size:30px; line-height:1;}
  .lb2{display:flex; flex-direction:column; gap:6px; margin-top:6px;}
  .lb2-row{display:flex; align-items:center; gap:10px; padding:8px 11px; border-radius:10px;
    border:1px solid var(--line); background:var(--surface);}
  .lb2-row.me{border-color:var(--gold); background:rgba(255,194,75,.07);}
  .lb2-rank{font-size:15px; width:20px; text-align:center; flex:0 0 auto; color:var(--muted); font-weight:700;}
  .lb2-nm{font-weight:700; font-size:13px; flex:0 0 auto; width:72px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lb2-bar{flex:1; height:7px; border-radius:99px; background:var(--ink); overflow:hidden;}
  .lb2-fill{display:block; height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); border-radius:99px; transition:width .3s;}
  .lb2-sc{font-size:12px; color:var(--muted); flex:0 0 auto; min-width:42px; text-align:right;}
  .lb2-row.me .lb2-nm{color:var(--gold);}

  .stage{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:22px 18px; text-align:center; margin-bottom:16px;}
  .eq{display:inline-flex; gap:4px; align-items:flex-end; height:34px; margin-bottom:10px;}
  .eq span{width:5px; background:linear-gradient(180deg,var(--gold),var(--cyan)); border-radius:3px; animation:eq 1s ease-in-out infinite;}
  .eq span:nth-child(2){animation-delay:.15s} .eq span:nth-child(3){animation-delay:.3s}
  .eq span:nth-child(4){animation-delay:.45s} .eq span:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:9px}50%{height:34px}}
  .eq.paused span{animation-play-state:paused; height:9px;}
  .eq.viz span{animation:none !important;}   /* live audio drives the heights */
  .stage h2{font-family:"Anton"; font-weight:400; font-size:22px; margin:4px 0 2px; letter-spacing:.5px;}
  .stage p{margin:0; color:var(--muted); font-size:13.5px;}

  .tl-label{font-size:12px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; margin:0 0 8px;}
  .timeline{display:flex; flex-wrap:wrap; align-items:stretch; gap:6px; padding:4px 2px 12px;}
  .slot{flex:0 0 auto; width:62px; align-self:stretch; min-height:96px; border-radius:12px;
    border:1.5px dashed var(--line); background:rgba(255,255,255,.015); color:var(--muted);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 4px; transition:.15s;}
  .slot.active{border-color:var(--cyan); color:var(--cyan); background:rgba(77,212,255,.07);}
  .slot.active:active{background:rgba(77,212,255,.18);}
  .slot .ins{font-size:18px;}
  .slot .rng{font-size:11px; line-height:1.2; text-align:center;}
  .tie{flex:0 0 auto; align-self:center; color:var(--muted); font-size:15px; font-weight:700; opacity:.55; padding:0 2px;}
  .placed{flex:0 0 auto; width:104px; min-height:96px; border-radius:12px; background:var(--surface-2);
    border:1px solid var(--line); padding:10px 9px; display:flex; flex-direction:column; justify-content:space-between;}
  .placed .yr{font-family:"Anton"; font-size:30px; color:var(--gold); line-height:.9;}
  .placed .ti{font-size:11px; line-height:1.25; max-height:42px; overflow:hidden;}
  .placed .ar{font-size:10px; color:var(--muted); margin-top:2px;}
  .empty-tl{color:var(--muted); font-size:13px; padding:14px 2px;}

  .controls{display:flex; gap:10px; margin-top:6px;}
  .controls .btn{flex:1;}
  .verify-state{margin-top:10px; font-size:12px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--cyan);}

  /* loading */
  .loadwrap{text-align:center; padding:60px 18px;}
  .loadbar{height:8px; border-radius:99px; background:var(--ink); overflow:hidden; margin:18px auto 0; max-width:280px; border:1px solid var(--line);}
  .loadfill{display:block; height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); border-radius:99px; transition:width .2s;}

  /* overlay */
  .overlay{position:fixed; inset:0; background:rgba(8,9,12,.72); backdrop-filter:blur(6px); display:none;
    align-items:center; justify-content:center; padding:22px; z-index:50;}
  .overlay.show{display:flex;}
  .sheet{width:100%; max-width:420px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:24px; text-align:center;
    animation:pop .22s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes pop{from{transform:scale(.9); opacity:0}to{transform:scale(1); opacity:1}}
  .verdict{font-family:"Anton"; font-size:34px; letter-spacing:1px; margin-bottom:4px;}
  .verdict.good{color:var(--good);} .verdict.bad{color:var(--bad);}
  .reveal-yr{font-family:"Anton"; font-size:72px; line-height:.9; margin:10px 0 2px;}
  .reveal-ti{font-size:17px; font-weight:700;}
  .reveal-ar{color:var(--muted); margin:2px 0 18px;}
  .report-yr{margin:12px 0 2px;}
  .report-yr summary{font-size:12px; color:var(--muted); cursor:pointer; list-style:none; opacity:.75;
    padding:12px 0;}   /* thumb-sized tap area without visual weight */
  .report-yr summary::-webkit-details-marker{display:none;}
  .report-yr[open] summary{opacity:1; margin-bottom:2px;}
  .year-fix{display:flex; align-items:center; justify-content:center; gap:8px;}
  .year-fix .muted{font-size:12px; letter-spacing:.12em; text-transform:uppercase;}
  .year-fix input.rev-yr{width:92px; height:46px; font-size:20px; text-align:center; -moz-appearance:textfield;}
  .year-fix input.rev-yr::-webkit-outer-spin-button, .year-fix input.rev-yr::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .winner-emoji{font-size:54px;}
  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:var(--bad); color:#fff;
    padding:11px 16px; border-radius:11px; font-size:13.5px; max-width:90%; text-align:center; z-index:60;
    box-shadow:0 8px 30px rgba(0,0,0,.4); display:none;}
  .toast.show{display:block;}
  #errbar{display:none; position:fixed; top:0; left:0; right:0; z-index:70; background:#3A1418; color:#FFD9D9;
    border-bottom:1px solid var(--bad); padding:14px 16px; font-size:12.5px; line-height:1.55; white-space:pre-wrap; cursor:pointer;}
  .footnote{margin-top:26px; font-size:11.5px; color:var(--muted); text-align:center; line-height:1.6;}
  .footnote a{display:inline-block; padding:6px 2px;}   /* small links, honest tap targets */
  .card[onclick]:focus-visible, .btn:focus-visible, .slot:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  a{color:var(--cyan);}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
<div id="app"></div>
<audio id="aud" loop playsinline preload="auto"></audio>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<div id="errbar" onclick="this.style.display='none'"></div>

<script>
"use strict";
const BUILD = "2.2.0";   // semver; keep in sync with CACHE_NAME in sw.js; shown in the footer
// geometric ✕ — a font glyph sits off-center in its em box on some devices
const XICON = '<svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true" style="display:block"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>';

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// Surface crashes instead of white-screening; the game is auto-saved each turn.
window.addEventListener("error", e => {
  try{ showError("Something glitched: "+((e&&e.message)||"unknown error")+"\nYour game is auto-saved — reload and tap Resume."); }catch(_){}
});
window.addEventListener("unhandledrejection", e => {
  try{ const r=e&&e.reason; showError("Something glitched: "+((r&&r.message)||r||"unknown error")+"\nYour game is auto-saved — reload and tap Resume."); }catch(_){}
});

/* ---------- tiny storage (degrades gracefully in sandboxes) ---------- */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};

/* ---------- config ---------- */
/* difficulty tiers — easy → hardest */
const DIFFICULTIES = [
  { n:10, name:"Easy Listening" },
  { n:15, name:"Music Buff" },
  { n:20, name:"Virtuoso" },
  { n:25, name:"Musical Genius" },
];

/* ---------- built-in decks ----------
   Songs are matched to a playable 30-second preview via the iTunes Search API
   at deck-load time; the audio always streams live from Apple, never bundled here.
   Years are EDITORIAL (original-release year) — verify before shipping a deck. */
const DECKS = [
  { id:"decades", name:"Through the Decades", emoji:"🎚️", desc:"Iconic hits, 1962–2023", songs:[
    {year:1965, artist:"The Rolling Stones", title:"(I Can't Get No) Satisfaction"},
    {year:1967, artist:"Aretha Franklin", title:"Respect"},
    {year:1968, artist:"The Beatles", title:"Hey Jude"},
    {year:1969, artist:"Creedence Clearwater Revival", title:"Fortunate Son"},
    {year:1964, artist:"The Beach Boys", title:"I Get Around"},
    {year:1967, artist:"The Doors", title:"Light My Fire"},
    {year:1966, artist:"The Beach Boys", title:"Good Vibrations"},
    {year:1968, artist:"Marvin Gaye", title:"I Heard It Through the Grapevine"},
    {year:1968, artist:"Otis Redding", title:"(Sittin' On) The Dock of the Bay"},
    {year:1962, artist:"The Beatles", title:"Love Me Do"},
    {year:1971, artist:"Led Zeppelin", title:"Stairway to Heaven"},
    {year:1975, artist:"Queen", title:"Bohemian Rhapsody"},
    {year:1977, artist:"Fleetwood Mac", title:"Dreams"},
    {year:1977, artist:"Bee Gees", title:"Stayin' Alive"},
    {year:1971, artist:"John Lennon", title:"Imagine"},
    {year:1976, artist:"Eagles", title:"Hotel California"},
    {year:1972, artist:"Stevie Wonder", title:"Superstition"},
    {year:1979, artist:"The Sugarhill Gang", title:"Rapper's Delight"},
    {year:1975, artist:"David Bowie", title:"Fame"},

function mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a);
  t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
// the stable pool: sorted by a stable key so an index means the same song for
// everyone on the same build — the basis of daily seeds AND challenge links
let _stablePool = null;
function stablePool(){
  if(_stablePool) return _stablePool;
  const every = DECKS.find(d => d.id==="everything");
  _stablePool = [...every.songs].sort((a,b)=> (norm(a.title)+"|"+norm(a.artist)) < (norm(b.title)+"|"+norm(b.artist)) ? -1 : 1);
  return _stablePool;
}
function poolIndexOf(card){   // -1 if the song isn't in the shared pool (e.g. custom deck)
  const k = norm(card.name||card.title)+"|"+norm(card.artist);
  return stablePool().findIndex(s => norm(s.title)+"|"+norm(s.artist) === k);
}
// seeded picks from the stable pool — CLUSTERED by era: every pick (anchor
// included) lands inside a narrow year window around a seeded center. A set
// spread over the whole pool leaves decade-wide gaps where any guess scores;
// tight gaps are what make a run hard. Tune difficulty with RUN_YEAR_SPAN.
// slot 0 = the anchor card, 1..RUN_LEN = mysteries, rest = spares for failed lookups
const RUN_YEAR_SPAN = 8;   // ± years around the set's center
function seededIdx(seed, n){
  const pool = stablePool();
  const rnd = mulberry32(seed % 2147483647);
  const center = pool[Math.floor(rnd() * pool.length)].year;
  let span = RUN_YEAR_SPAN, cand = [];
  for(;;){
    cand = [];
    for(let i=0;i<pool.length;i++) if(Math.abs(pool[i].year - center) <= span) cand.push(i);
    if(cand.length >= n*4 || span > 60) break;   // sparse era: widen until there's real choice
    span += 2;
  }
  const picked = [], seen = new Set();
  while(picked.length < n && seen.size < cand.length){
    const j = cand[Math.floor(rnd() * cand.length)];
    if(seen.has(j)) continue; seen.add(j);
    picked.push(j);
  }
  return picked;
}
function seededSongs(seed, n){ return seededIdx(seed, n).map(i => stablePool()[i]); }

let _jsonpN = 0;
function itunesSearch(term, limit){
  limit = limit || 8;
  return new Promise(resolve => {
    const cb = "itc_" + (++_jsonpN);
    const s = document.createElement("script");
    let done = false;
    const finish = (results) => { if(done) return; done = true; try{ delete window[cb]; }catch(e){ window[cb]=undefined; } s.remove(); clearTimeout(to); resolve(results||[]); };
    const to = setTimeout(()=> finish([]), 9000);
    window[cb] = data => finish((data && data.results) || []);
    s.onerror = () => finish([]);
    s.src = "https://itunes.apple.com/search?media=music&entity=song&limit="+limit
          +"&term="+encodeURIComponent(term)+"&callback="+cb;
    document.head.appendChild(s);
  });
}
function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }
function yearOf(releaseDate){ const y = parseInt(String(releaseDate||"").slice(0,4),10); return y||null; }
// pick the result that best matches the curated title/artist and has a playable preview
// karaoke / tribute / novelty versions often have wrong or silent previews
const BADVER = /karaoke|tribute|made famous|originally performed|as made popular|8[\- ]?bit|lullaby|meditation|piano tribute/i;
// compare on the CORE title: "(feat. …)" / "[Club Mix]" suffixes off. Apple's
// canonical track is often "Title (feat. X)", which never matched exactly and
// could tie with a DIFFERENT same-artist song whose short title is a substring
// (want "I Like to Move It": real "…(feat. The Mad Stuntman)" and other track
// "Move It!" both scored 1 — iTunes result order then decided the audio).
function coreNorm(s){
  return norm(String(s||"")
    .replace(/\(.*?\)|\[.*?\]/g, " ")                 // "(feat. X)" / "[Club Mix]"
    .replace(/\b(feat\.?|ft\.?|featuring)\b.*$/i, " ")); // unbracketed "feat. X" tails
}
function pickBest(results, song){
  const wantT = norm(song.title), wantA = norm(song.artist);
  const wantTC = coreNorm(song.title) || wantT;
  let best=null, bestScore=-1;
  for(const r of results){
    if(!r.previewUrl) continue;
    if(BADVER.test(r.artistName||"") || BADVER.test(r.collectionName||"")) continue;
    const t = norm(r.trackName), tc = coreNorm(r.trackName) || t, a = norm(r.artistName);
    let tScore = 0, aScore = 0;
    if(t===wantT || tc===wantTC) tScore = 3;
    else if(t.includes(wantT)||tc.includes(wantTC)) tScore = 1;             // result extends want: mixes/edits
    else if((wantT.includes(t)||wantTC.includes(tc)) && tc.length >= wantTC.length*0.7) tScore = 1;
    // reverse containment (result much SHORTER than want) is a wrong-song
    // vector — "Move It!" ⊂ "I Like to Move It" — so it needs ≥70% length
    if(a===wantA) aScore = 2; else if(a.includes(wantA)||wantA.includes(a)) aScore = 1;
    // BOTH must match at least partially — artist-only allowed wrong-song swaps.
    // Skipping is always better than playing the wrong song.
    if(tScore===0 || aScore===0) continue;
    // prefer releases from the curated era: original single/album beats a
    // "(2010 Mixes)" reissue or sped-up upload when the text scores tie
    const ry = yearOf(r.releaseDate);
    const yBonus = (ry && song.year && Math.abs(ry - song.year) <= 3) ? 1 : 0;
    const score = tScore + aScore + yBonus;
    if(score>bestScore){ bestScore=score; best=r; }
  }
  return best;
}

function allDecks(){ return DECKS.concat(S.customDecks); }
function isSelected(id){ return S.selectedIds.indexOf(id) >= 0; }
// merged, de-duplicated song list across every selected deck
function selectedSongs(){
  const out = [], seen = new Set();
  for(const id of S.selectedIds){
    const d = allDecks().find(x => x.id===id);
    if(!d) continue;
    for(const s of d.songs){
      const k = norm(s.title)+"|"+norm(s.artist);
      if(seen.has(k)) continue;
      seen.add(k); out.push(s);
    }
  }
  return out;
}
// Progressive, throttled deck loading. We resolve a small first batch so the
// game can start, then trickle the rest in the background — both to start fast
// and to stay under Apple's request rate limit (bursting ~100 lookups at once
// gets most of them throttled to empty, which used to starve the deck).
let bgRun = 0;   // bumped each game; background loaders stop when it changes
async function resolveBatch(slice){
  const hits = await Promise.all(slice.map(async sg => {
    let res = [];
    try{ res = await itunesSearch(sg.artist+" "+sg.title, 10); }catch(e){}
    return { sg, hit: pickBest(res, sg) };
  }));
  let added = 0;
  for(const {sg,hit} of hits){
    if(hit && hit.previewUrl && !S.deckSeen.has(hit.trackId)){
      S.deckSeen.add(hit.trackId);
      const c = { id:"it"+hit.trackId, name:sg.title, artist:sg.artist, year:sg.year, previewUrl:hit.previewUrl,
                  view: /^https:\/\//.test(hit.trackViewUrl||"") ? hit.trackViewUrl : "" };   // Apple Music page, shown on reveals
      if(S.yearOverrides[c.id]) c.year = S.yearOverrides[c.id];
      S.deck.push(c); added++;
    }
  }
  return added;
}
// the first batch — must be ready before play; gentle but not slow
async function resolveInitial(list, onProgress, enough){
  const BATCH = 3;
  for(let i=0;i<list.length;i+=BATCH){
    await resolveBatch(list.slice(i, i+BATCH));
    if(onProgress) onProgress(Math.min(list.length, i+BATCH), list.length);
    if(enough && enough()) return Math.min(list.length, i+BATCH);   // got the minimum — start now
    await new Promise(r => setTimeout(r, 350));
  }
  return list.length;
}
// the rest — streamed in slowly while the game is played
async function loadRest(list, myRun){
  S.loadingMore = true;
  const BATCH = 2, DELAY = 2200;
  for(let i=0;i<list.length;i+=BATCH){
    if(bgRun !== myRun){ S.loadingMore = false; return; }   // game ended/restarted
    await resolveBatch(list.slice(i, i+BATCH));
    await new Promise(r => setTimeout(r, DELAY));
  }
  S.loadingMore = false;
}

// before the first real clip has loaded (the bug that muted the first game)
const SILENT = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
const reducedMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
/* live audio visualizer — real frequency analysis of the playing preview.
   Routing audio through Web Audio mutes cross-origin media unless the server
   sends CORS headers, so we probe once and only enable if it's safe; otherwise
   we keep the CSS-animated bars and playback is untouched. */
let audioCtx=null, srcNode=null, analyser=null, freqData=null, vizRAF=0, vizEnabled=false, corsChecked=false;
function initAudioCtx(){
  if(audioCtx) return audioCtx;
  try{ const AC = window.AudioContext||window.webkitAudioContext; if(AC) audioCtx = new AC(); }catch(e){}
  return audioCtx;
}
async function maybeEnableViz(url){
  if(vizEnabled || corsChecked || reducedMotion || !url) return;
  corsChecked = true;
  try{ await fetch(url, { mode:"cors" }); }catch(e){ return; }   // no CORS → keep CSS bars, never touch WebAudio
  const a = aud(), ctx = initAudioCtx();
  if(!a || !ctx || srcNode) return;
  try{
    a.crossOrigin = "anonymous";
    analyser = ctx.createAnalyser(); analyser.fftSize = 64; analyser.smoothingTimeConstant = 0.75;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    srcNode = ctx.createMediaElementSource(a);   // one-way — only done after CORS is confirmed
    srcNode.connect(analyser); analyser.connect(ctx.destination);
    vizEnabled = true;
    if(ctx.state==="suspended") ctx.resume();
    a.load(); a.play().catch(()=>{});            // reload current clip CORS-clean so it keeps sound
    if(S.playing) startViz();
  }catch(e){ vizEnabled=false; }
}
function vizLoop(){
  vizRAF = 0;
  const eq = document.querySelector('.eq');
  const bars = eq ? eq.querySelectorAll('span') : [];
  if(!analyser || !bars.length || !S.playing) return;   // stop; restarts on next 'playing'
  if(!eq.classList.contains('viz')) eq.classList.add('viz');   // ensure the CSS keyframes are off
  analyser.getByteFrequencyData(freqData);
  const bins = [1,3,5,8,12];
  for(let i=0;i<bars.length;i++){
    const v = freqData[bins[i]] || 0;
    bars[i].style.height = (8 + (v/255)*26).toFixed(1) + "px";
  }
  vizRAF = requestAnimationFrame(vizLoop);
}
function startViz(){ if(!vizEnabled || reducedMotion || vizRAF) return; vizRAF = requestAnimationFrame(vizLoop); }
function stopViz(){ if(vizRAF){ cancelAnimationFrame(vizRAF); vizRAF=0; } const eq=document.querySelector('.eq'); if(eq) eq.querySelectorAll('span').forEach(s=>s.style.height='9px'); }

let audioUnlocked = false;   // once the element has really played, it stays unlocked for the session
function unlockAudio(){
  const a = aud(); if(!a) return;
  try{ const c=initAudioCtx(); if(c && c.state==="suspended") c.resume(); }catch(e){}   // must resume in a gesture
  // Already unlocked (or actively playing)? Don't run the silent-WAV dance: its
  // deferred pause() would race a playClip() issued in the same tap and silence
  // the brand-new clip (bug: only the first track played after the handoff merge).
  if(audioUnlocked || !a.paused) return;
  try{
    if(!a.src){ a.src = SILENT; }      // no real clip yet → unlock with silence
    a.muted = true;
    const p = a.play();
    // deferred pause must NEVER touch a real clip: only silence gets paused
    // (a fast deck load could otherwise land this pause on the first track)
    const settle = ()=>{ audioUnlocked = true; if(a.src === SILENT){ a.pause(); a.currentTime = 0; } a.muted = false; };
    if(p && p.then) p.then(settle).catch(()=>{ a.muted = false; });
    else settle();
  }catch(e){ a.muted=false; }
}
function maskMediaSession(){
  if(!("mediaSession" in navigator)) return;
  try{
    navigator.mediaSession.metadata = new MediaMetadata({ title:"🎵 Yearworm", artist:"guess the year", album:"" });
  }catch(e){}
}
function playClip(card){
  const a = aud(); if(!a || !card) return;
  wireAudio();
  try{
    if(vizEnabled) a.crossOrigin = "anonymous";   // keep clips CORS-clean once routed through WebAudio
    if(a.src !== card.previewUrl){ a.src = card.previewUrl; }
    a.currentTime = 0;
    const p = a.play();
    if(p && p.catch) p.catch(()=>{ S.playing=false; syncEq(); /* gesture needed — the ▶ Play button starts it */ });
    S.playing = true;
    maskMediaSession();
    maybeEnableViz(card.previewUrl);              // one-time: enable the live visualizer if CORS allows
  }catch(e){ S.playing = false; }
}
// keep the equalizer honest without a full re-render
function syncEq(){
  const eq=document.querySelector('.eq'); if(eq) eq.classList.toggle('paused', !S.playing);
  const b=document.getElementById('ppBtn'); if(b) b.innerHTML = S.playing ? '❚❚&nbsp; Pause' : '▶&nbsp; Play';
}
// some iTunes previews are broken/silent — detect the load failure and move on
let autoSkips = 0;
function wireAudio(){
  const a = aud(); if(!a || a._wired) return; a._wired = true;
  a.addEventListener('playing', ()=>{ audioUnlocked=true; autoSkips=0; S.playing=true; syncEq(); startViz(); });
  a.addEventListener('pause',   ()=>{ S.playing=false; syncEq(); stopViz(); });
  a.addEventListener('error',   onAudioFail);
}
function onAudioFail(){
  const a = aud();
  if(!S.current || !S.players || !S.players.length) return;
  if(!a || a.src !== S.current.previewUrl) return;   // ignore stale / silent-unlock errors
  if(++autoSkips > 6){ autoSkips=0; showError("Several previews wouldn't load — Apple may be rate-limiting. Wait a few seconds, then tap ▶ Play."); return; }
  toast("Couldn't load that clip — skipping.");
  skipTrack();
}
// auto-skip a broken preview — same player gets a fresh track; no score change.
// (the manual Skip button was removed: curated decks + the 🚩 report flow cover it)
function skipTrack(){
  if(!S.current) return;
  buzz(6);
  S.used.add(S.current.id);   // don't offer this one again
  nextTurn();
}
// one toggle covers everything: resume after pause, AND the manual recovery
// path when mobile blocked autoplay (call/notification/first-gesture cases)
function togglePlay(){
  if(!S.current) return;
  const a = aud();
  if(a && !a.paused){ a.pause(); S.playing=false; renderGame(); return; }
  unlockAudio(); playClip(S.current); renderGame();
}

/* ---------- game logic ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function drawCard(){
  const avail = S.deck.filter(c => !S.used.has(c.id) && !inAnyTimeline(c.id));
  if(avail.length===0) return null;
  if(S.mode==="daily" || S.mode==="challenge") return avail[0];   // deck order IS the seeded order
  return avail[Math.floor(Math.random()*avail.length)];
}
function inAnyTimeline(id){ return S.players.some(p => p.timeline.some(c => c.id===id)); }

/* ---------- save / resume (survives crashes & reloads) ---------- */
function saveGame(){
  try{
    if(S.mode==="daily" || S.mode==="challenge" || S.turbo) return;   // 3-minute runs aren't worth resuming
    if(!S.players || !S.players.length) return;
    store.set("tl_game", JSON.stringify({
      v:2, target:S.target, turn:S.turn, deck:S.deck, used:[...S.used],
      current:S.current, players:S.players.map(p=>({name:p.name, timeline:p.timeline})),
      mode:S.mode, lives:S.lives, score:S.score, streak:S.streak, bestStreak:S.bestStreak
    }));
  }catch(e){}
}
function clearGame(){ store.del("tl_game"); }
function loadSaved(){ try{ return JSON.parse(store.get("tl_game")||"null"); }catch(e){ return null; } }
function hasSavedGame(){
  const d = loadSaved();
  return !!(d && d.players && d.players.length && (d.current || d.players.some(p=>(p.timeline||[]).length>1)));
}
function savedSummary(){
  const d = loadSaved(); if(!d) return "in progress";
  if(d.mode==="survival"){
    const hearts = "❤️".repeat(Math.max(0, d.lives||0)) || "💀";
    return "Survival — "+(d.score||0)+" placed · "+hearts;
  }
  const lead = [...(d.players||[])].sort((a,b)=>(b.timeline||[]).length-(a.timeline||[]).length)[0];
  return lead ? esc(lead.name)+" leading ("+(lead.timeline||[]).length+"/"+(d.target||"?")+")" : "in progress";
}
function discardSaved(){ clearGame(); renderSetup(); }
function resumeSaved(){
  const d = loadSaved();
  if(!d){ toast("No saved game to resume."); return; }
  S.target = d.target||S.target;
  S.turn = d.turn||0;
  S.deck = d.deck||[];
  S.used = new Set(d.used||[]);
  S.current = d.current||null;
  S.players = (d.players||[]).map(p=>({name:p.name||"Player", timeline:p.timeline||[]}));
  S.mode = d.mode || "classic";
  S.lives = (typeof d.lives==="number") ? d.lives : 0;
  S.score = d.score||0; S.streak = d.streak||0; S.bestStreak = d.bestStreak||0;
  unlockAudio();                 // this is a user tap → unlocks mobile audio
  renderGame();
  if(S.current) playClip(S.current);
}

function startGame(){
  bgRun++;   // invalidate any background loader from a previous game
  if(S.mode!=="daily" && S.mode!=="challenge") shuffle(S.deck);   // seeded runs: the order IS the puzzle
  if(isRun()){
    // runs play on ONE shared timeline: a single neutral anchor, and every
    // player's locked cards land on the same board (colored per player)
    const c = drawCard();
    const board = [];
    if(c){ S.used.add(c.id); c.owner = -1; board.push(c); }
    S.players.forEach(p => { p.timeline = board; });   // same array reference
  } else {
    // classic/survival: seed each player their own freebie reference card
    S.players.forEach(p=>{
      p.timeMs = 0;
      const c = drawCard();
      if(c){ S.used.add(c.id); p.timeline = [c]; }
    });
  }
  S.turn = 0;
  if(S.mode==="survival"){ S.lives = 3; S.score = 0; S.streak = 0; S.bestStreak = 0; }
  if(isRun()){
    S.players.forEach(pl => { pl.tries = 0; pl.hits = 0; pl.results = []; pl.timeMs = 0; });
    // track pool indices for challenge links (solo runs only; null = unencodable)
    S.runCards = null;
    if(S.players.length===1 && S.players[0].timeline[0]){
      const ai = poolIndexOf(S.players[0].timeline[0]);
      S.runCards = ai>=0 ? [ai] : null;
    }
  }
  nextTurn();
  renderGame();
  saveGame();
}

async function nextTurn(){
  S.pendingSlot = null;
  S.checkingTrack = false;
  S.checkMessage = "";
  S.current = null;   // no stale card while we draw/wait — otherwise the slots stay
                      // tappable and a tap "re-places" last turn's card (ghost turn)
  let c = drawCard();
  if(!c && S.loadingMore){
    // background loader is still fetching — wait for more cards, don't end the game
    S.checkingTrack = true; S.checkMessage = "Loading more songs…"; renderGame();
    for(let t=0; t<60 && !c; t++){
      await new Promise(r => setTimeout(r, 400));
      c = drawCard();
      if(!S.loadingMore) break;
    }
    S.checkingTrack = false; S.checkMessage = "";
  }
  if(!c){
    if(isRun()){ overlayRunOver(); return; }   // ran dry mid-run: score what we have
    overlayGameOver(true); return;
  }
  S.current = c;
  S.turnStart = Date.now();   // run tiebreaker: thinking time from clip start to placement
  if(isRun() && S.runCards && S.players.length===1){
    const i = poolIndexOf(c);
    S.runCards = i>=0 ? [...S.runCards, i] : null;   // null: contains a song outside the shared pool
  }
  saveGame();
  renderGame();
  playClip(c);
  renderGame();
}

function sortedTimeline(p){ return [...p.timeline].sort((a,b)=>a.year-b.year); }
function slotCorrect(p, idx){
  const tl = sortedTimeline(p).filter(c => c.id !== S.current.id);
  const y = S.current.year;
  const left = idx>0 ? tl[idx-1].year : -Infinity;
  const right = idx<tl.length ? tl[idx].year : Infinity;
  return y >= left && y <= right;   // inclusive — same-year is correct on either side
}
/* haptics — a non-visual feedback cue (good on mobile + for accessibility) */
function buzz(pattern){ try{ if("vibrate" in navigator) navigator.vibrate(pattern); }catch(e){} }
/* where the card actually belonged, for "you missed" feedback */
function correctRange(p, c){
  const yrs = sortedTimeline(p).filter(x => x.id !== c.id).map(x => x.year);
  let left=null, right=null;
  for(const y of yrs){ if(y < c.year) left = y; }                 // largest strictly-less
  for(const y of yrs){ if(y > c.year){ right = y; break; } }      // smallest strictly-greater
  if(left===null && right===null) return "";
  if(left===null) return `before ${right}`;
  if(right===null) return `after ${left}`;
  return `between ${left} & ${right}`;
}
function showCheckingState(message){
  S.checkingTrack = true;
  S.checkMessage = message || "Checking track…";
  closeOverlay();
  renderGame();
}
function chooseSlot(idx){
  if(!S.current) return;
  const p = S.players[S.turn];
  S.pendingSlot = idx;
  buzz(8);                                  // confirm the tap landed
  const correct = slotCorrect(p, idx);      // instant — no fake "checking" delay
  const run = isRun();
  // classic/survival: only correct cards stay. Runs: EVERY card locks at its
  // true year (right or wrong) so the board densifies and the run gets harder.
  if(run){ S.current.owner = S.turn; S.current.wrong = !correct; }   // colors the shared board; misses lock in red
  if((correct || run) && !p.timeline.some(c => c.id === S.current.id)){
    p.timeline.push(S.current);
    p.timeline.sort((a,b)=>a.year-b.year);
  }
  if(S.mode==="survival"){
    if(correct){ S.score++; S.streak++; if(S.streak>S.bestStreak) S.bestStreak = S.streak; }
    else { S.lives--; S.streak = 0; }
  }
  p.timeMs = (p.timeMs||0) + turnElapsed();
  if(run){ p.tries=(p.tries||0)+1; (p.results=p.results||[]).push(!!correct); if(correct) p.hits=(p.hits||0)+1; }
  S.used.add(S.current.id);
  buzz(correct ? 18 : [0,45,45,45]);        // crisp tick vs penalty buzz-buzz
  saveGame();
  overlayReveal(correct, p);
}
function advance(){
  closeOverlay();
  const p = S.players[S.turn];
  if(isRun()){
    if(S.players.every(pl => (pl.tries||0) >= RUN_LEN)){ overlayRunOver(); return; }
    do{ S.turn = (S.turn+1) % S.players.length; } while((S.players[S.turn].tries||0) >= RUN_LEN);
    unlockAudio();
    nextTurn();
    return;
  }
  if(S.mode==="survival"){
    if(S.lives <= 0){ overlayGameOver(false, p); return; }
    nextTurn();   // same solo player keeps going — endless until out of lives
    return;
  }
  // fair race: someone reaching the target doesn't end the game while a later
  // player this round can still tie (they're one card short). Hopeless final
  // turns are skipped; card-ties are broken by total thinking time.
  const someoneFinished = S.players.some(pl => pl.timeline.length >= S.target);
  if(someoneFinished){
    if(raceOver()){ overlayGameOver(false); return; }
    do{ S.turn++; } while(S.players[S.turn].timeline.length !== S.target-1);   // next player who can still tie
  } else {
    S.turn = (S.turn+1) % S.players.length;
  }
  unlockAudio();   // this tap is a fresh user gesture — re-primes audio for the new turn
  nextTurn();      // clip loops, so nothing is missed while the phone is handed over
}

/* ---------- rendering ---------- */
const app = () => document.getElementById("app");
function val(id){ const el=document.getElementById(id); return el?el.value:""; }
function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

let toastTimer;
function toast(msg, sticky){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  if(!sticky) toastTimer=setTimeout(()=>t.classList.remove("show"), 3400);
}
function hideToast(){ clearTimeout(toastTimer); const t=document.getElementById("toast"); if(t) t.classList.remove("show"); }
function closeOverlay(){ document.getElementById("overlay").classList.remove("show"); }
function showError(msg){
  const e=document.getElementById("errbar");
  e.textContent = "⚠ "+msg+"\n\n(tap to dismiss)";
  e.style.display="block";
  window.scrollTo(0,0);
  console.error("[Yearworm]", msg);
}

function deckChipHTML(d){
  const sel = isSelected(d.id);
  const meta = d.songs.length + " songs" + (d.desc ? " · " + d.desc : "");
  return `<button class="dchip ${sel?'sel':''}" data-id="${d.id}" onclick="toggleDeck('${d.id}')">
    <span class="de">${sel?'✓':(d.emoji||'🎵')}</span>
    <span class="dm"><span class="dn2">${esc(d.name)}</span><span class="dc2">${esc(meta)}</span></span>
  </button>`;
}
function deckCardHTML(d, count){
  const sel = isSelected(d.id);
  return `<button class="deck ${sel?'sel':''}" data-id="${d.id}" onclick="toggleDeck('${d.id}')">
    <span class="demoji">${sel?'✓':(d.emoji||'🎵')}</span>
    <span class="dmeta"><span class="dt">${esc(d.name)}</span><span class="dd">${esc(d.desc||'')}</span></span>
    <span class="dn">${count} songs</span>
  </button>`;
}

// the tally / recommendation line under the deck picker (updated in place on toggle)
function tallyHTML(){
  const combined = selectedSongs().length;
  const rec = (S.players.length||1) * S.target;
  if(!S.selectedIds.length) return `Pick one or more decks — tap to combine. Swipe sideways for more.`;
  if(S.mode==="survival") return `<b style="color:var(--text)">${combined} songs</b> in the pool — survival pulls a fresh random run each time.`;
  return `<b style="color:var(--text)">${combined} songs</b> across ${S.selectedIds.length} deck${S.selectedIds.length>1?'s':''}`
    + ` · recommended ~${rec}+ for ${S.players.length||1} player${(S.players.length||1)>1?'s':''} × ${S.target}`
    + (combined < rec ? ` <span style="color:var(--bad)">— add another deck</span>` : ` <span style="color:var(--good)">✓</span>`);
}
function updateTally(){ const el=document.getElementById("deckTally"); if(el) el.innerHTML = tallyHTML(); }
// page the decks into side-scrollable groups of 6 (2 cols × 3 rows)
function deckCarouselHTML(){
  const PAGE = 6, pages = [];
  for(let i=0;i<DECKS.length;i+=PAGE) pages.push(DECKS.slice(i, i+PAGE));
  const cards = pages.map(pg => `<div class="deck-page">${pg.map(d=>deckChipHTML(d)).join("")}</div>`).join("");
  const dots = pages.length>1
    ? `<div class="car-dots" id="carDots">${pages.map((_,i)=>`<span class="car-dot ${i===0?'on':''}"></span>`).join("")}</div>` : ``;
  return `<div class="deck-carousel" id="deckCar" onscroll="syncDots()">${cards}</div>${dots}`;
}
function syncDots(){
  const car=document.getElementById("deckCar"), dots=document.getElementById("carDots");
  if(!car||!dots||!car.clientWidth) return;
  const page = Math.round(car.scrollLeft / car.clientWidth);
  [...dots.children].forEach((d,i)=>d.classList.toggle("on", i===page));
}
function renderSetup(){
  if(!S.players.length) S.players=[{name:"",timeline:[]},{name:"",timeline:[]}];   // pass & play is 2+ by nature
  const survival = S.mode==="survival";
  const turbo = S.mode==="classic" && S.turbo;
  const dNum = dailyNumber(), dState = loadDaily();
  const dailyDone = dailyPlayedToday();
  const custom = S.customDecks.map(d =>
    `<div class="row" style="align-items:stretch">
       <div style="flex:1">${deckCardHTML(d, d.songs.length)}</div>
       <button class="btn iconbtn ghost" title="Edit deck" onclick="editDeck('${d.id}')">✎</button>
     </div>`).join("");
  // Incoming link carries a score AND we've played this set → it's a result
  // coming back: show the verdict. (Unless the score+time are our own — then
  // it's just our own link and the "your challenge" card below handles it.)
  let chalResultHTML = "";
  if(S.challenge && S.challenge.beat != null){
    const mine = chalPlayed(S.challenge.idx);
    const ownEcho = mine && mine.m && S.challenge.beat === mine.s
      && (S.challenge.beatTime == null || S.challenge.beatTime === Math.round((mine.t||0)/1000)*1000);
    if(mine && !ownEcho){
      const tS = S.challenge.beat, tT = S.challenge.beatTime;
      const both = `their <b style="color:var(--text)">${tS}/${RUN_LEN}</b>${tT?` ⏱ ${fmtTime(tT)}`:``} vs your <b style="color:var(--text)">${mine.s}/${RUN_LEN}</b>${mine.t?` ⏱ ${fmtTime(mine.t)}`:``}`;
      let icon, line;
      if(tS > mine.s){ icon="😤"; line=`They beat you — ${both}.`; }
      else if(tS < mine.s){ icon="🏆"; line=`You're still on top — ${both}.`; }
      else if(tT && mine.t && tT !== Math.round((mine.t||0)/1000)*1000){
        icon = tT < mine.t ? "😤" : "🏆";
        line = `Tie on cards, ${tT < mine.t ? "they were faster" : "you were faster"} — ${both}.`;
      } else { icon="🤝"; line=`Dead even — ${both}.`; }
      chalResultHTML = `
    <div class="card" style="border-color:var(--violet)">
      <div class="eyebrow" style="color:var(--violet)">🏁 challenge result ${icon}</div>
      <div class="muted" style="font-size:12.5px; margin-top:4px">${line}</div>
      <div class="row" style="margin-top:10px; gap:8px">
        <button class="btn sm pink" onclick="startFreshChallenge()">⚔️ Rematch — new songs</button>
        <button class="btn sm" onclick="shareChallengeBack()">📤 Send result</button>
      </div>
    </div>`;
    }
  }
  app().innerHTML = `
    <div class="eyebrow">drop the needle · guess the year</div>
    <h1 class="brand">Yearworm</h1>
    <div class="tag">Hear a track, slot it into your timeline by release year. ${survival ? '<b>3 lives, endless</b> — how long a run can you build?' : turbo ? '<b>5 songs, one timeline</b> — a full game in 3 minutes.' : 'Build a run of '+S.target+' and you win.'} No account needed — songs play as 30-second previews.</div>

    <div class="card" role="button" tabindex="0" style="border-color:var(--gold); cursor:pointer" onclick="${dailyDone ? 'shareDaily()' : 'startDaily()'}">
      <div class="row" style="justify-content:space-between; align-items:center">
        <div>
          <div class="eyebrow">📅 daily challenge #${dNum}</div>
          <div class="muted" style="font-size:12.5px; margin-top:4px">${dailyDone
            ? `Done — <b style="color:var(--text)">${dState.score}/${RUN_LEN}</b> · streak 🔥${dState.streak||1}`
            : `Today's ${RUN_LEN} songs — same for everyone${(dState.streak&&dState.last===localDay(-1))?` · streak 🔥${dState.streak}`:''}`}</div>
        </div>
        ${dailyDone
          ? `<button class="btn sm" style="flex:0 0 auto">⚔️ Challenge</button>`
          : `<button class="btn sm primary" style="flex:0 0 auto">▶ Play</button>`}

function renderPlayers(){

    <div class="row">

/* ---------- deck builder ---------- */
function newDeck(){ S.builder = { id:null, name:"", songs:[], results:[] }; renderBuilder(); }
function editDeck(id){
  const d = S.customDecks.find(x=>x.id===id); if(!d) return;
  S.builder = { id:d.id, name:d.name, songs:d.songs.map(s=>({...s})), results:[] };
  renderBuilder();
}
function renderBuilder(){
  const b = S.builder;
  const songs = b.songs.map((s,i)=>`
    <div class="song-row">
      <div class="res-meta"><div class="res-ti">${esc(s.title)}</div><div class="res-ar">${esc(s.artist)}</div></div>
      <input class="yr" type="number" inputmode="numeric" value="${s.year||''}" onchange="setSongYear(${i}, this.value)" />
      <button class="btn iconbtn ghost" onclick="removeSong(${i})" aria-label="Remove song">${XICON}</button>
    </div>`).join("");
  const inDeck = r => b.songs.some(s => norm(s.title)===norm(r.trackName) && norm(s.artist)===norm(r.artistName));
  const results = b.results.map((r,i)=>`
    <div class="res-row">
      <div class="res-meta"><div class="res-ti">${esc(r.trackName)}</div><div class="res-ar">${esc(r.artistName)}</div></div>
      <div class="res-yr">${yearOf(r.releaseDate)||'?'}</div>
      ${inDeck(r)
        ? `<button class="btn sm added" style="flex:0 0 auto" disabled>✓ Added</button>`
        : `<button class="btn sm" style="flex:0 0 auto" onclick="addResult(${i})">+ Add</button>`}
    </div>`).join("");
  app().innerHTML = `
    <div class="topbar">
      <div class="turn-name" style="font-size:24px">${b.id?'Edit deck':'New deck'}</div>
      <button class="btn sm ghost" onclick="cancelBuilder()">Cancel</button>
    </div>
    <div class="card">
      <label class="fld" for="deckName">Deck name</label>
      <input id="deckName" type="text" placeholder="My mixtape" value="${esc(b.name)}" oninput="S.builder.name=this.value" />
    </div>
    <div class="card">
      <div class="eyebrow" style="color:var(--cyan)">search &amp; add songs</div>
      <div style="height:10px"></div>
      <div class="row">
        <input id="sq" type="text" placeholder="artist or song title" onkeydown="if(event.key==='Enter')runSearch()" />
        <button class="btn sm" style="flex:0 0 auto" onclick="runSearch()">Search</button>
      </div>
      <div class="hint">The year is auto-filled from Apple's release date — <b>double-check it</b>, since remasters and comps often report the wrong year.</div>
      ${results ? `<div class="res-list">${results}</div>` : ``}
    </div>
    <div class="card">
      <div class="eyebrow" style="color:var(--cyan)">deck · ${b.songs.length} song${b.songs.length===1?"":"s"}</div>
      <div style="height:10px"></div>
      ${songs ? `<div class="res-list">${songs}</div>` : `<div class="empty-tl">No songs yet — search above and tap “Add”.</div>`}
    </div>
    <button class="btn pink" style="margin-top:16px; padding:16px" onclick="saveBuilder()">Save deck</button>
    ${b.id ? `<button class="btn ghost" style="margin-top:10px; color:var(--bad)" onclick="deleteDeck()">🗑 Delete this deck</button>` : ``}
  `;
}
function deleteDeck(){
  const b = S.builder; if(!b || !b.id) return;
  const nm = (b.name||"").trim() || "this deck";
  if(!confirm('Delete "'+nm+'"? This can\'t be undone.')) return;
  S.customDecks = S.customDecks.filter(d => d.id !== b.id);
  S.selectedIds = S.selectedIds.filter(id => id !== b.id);
  saveDecks();
  S.builder = null;
  toast("Deck deleted");
  renderSetup();
}
async function runSearch(){
  const q = val("sq").trim();
  if(!q){ return; }
  toast("Searching…", true);
  S.builder.results = await itunesSearch(q, 12);
  hideToast();
  // keep only playable, de-duped results
  const seen = new Set();
  S.builder.results = S.builder.results.filter(r => r.previewUrl && !seen.has(r.trackId) && seen.add(r.trackId));
  if(!S.builder.results.length) toast("No previewable songs found — try a different search.");
  renderBuilder();
}
function addResult(i){
  const r = S.builder.results[i]; if(!r) return;
  if(S.builder.songs.some(s => norm(s.title)===norm(r.trackName) && norm(s.artist)===norm(r.artistName))){ toast("Already in the deck."); return; }
  S.builder.songs.push({ title:r.trackName, artist:r.artistName, year:yearOf(r.releaseDate) });
  buzz(8);   // tactile confirm; the row's button re-renders as a gold "✓ Added"
  renderBuilder();
}
function setSongYear(i, v){ const y=parseInt(v,10); if(S.builder.songs[i]) S.builder.songs[i].year = (y&&y>=1860&&y<=2100)?y:null; }
function removeSong(i){ S.builder.songs.splice(i,1); renderBuilder(); }
function cancelBuilder(){ S.builder=null; renderSetup(); }
function saveDecks(){ store.set("tl_decks", JSON.stringify(S.customDecks)); }
function saveBuilder(){
  const b = S.builder;
  const name = (b.name||"").trim();
  if(!name){ toast("Give the deck a name."); return; }
  if(b.songs.length < 2){ toast("Add at least 2 songs."); return; }
  if(b.songs.some(s => !s.year)){ toast("Every song needs a year."); return; }
  if(b.id){
    const d = S.customDecks.find(x=>x.id===b.id);
    if(d){ d.name=name; d.songs=b.songs.map(s=>({...s})); }
  } else {
    const id = "u"+Math.random().toString(36).slice(2,9);
    S.customDecks.push({ id, name, emoji:"🎧", desc:"Your deck", songs:b.songs.map(s=>({...s})) });
    if(S.selectedIds.indexOf(id)<0) S.selectedIds.push(id);
  }
  saveDecks();
  S.builder = null;
  renderSetup();
}

function renderGame(){
  const p = S.players[S.turn];
  const tl = sortedTimeline(p);
  let slotsHTML = "";
  const live = !!S.current;
  for(let i=0;i<=tl.length;i++){
    const left = i>0 ? tl[i-1].year : null;
    const right = i<tl.length ? tl[i].year : null;
    if(left!==null && right!==null && left===right){
      // same year on both sides — the gap adds nothing (before/after score too), show a tie mark
      slotsHTML += `<div class="tie" title="same year">=</div>`;
    } else {
      const rng = left===null ? `before ${right}` : right===null ? `after ${left}` : `${left}–${right}`;
      slotsHTML += `<button class="slot ${live?'active':''}" ${live?`onclick="chooseSlot(${i})"`:'disabled'}>
        <span class="ins">+</span><span class="rng">${rng}</span></button>`;
    }
    if(i<tl.length){
      const oc = tl[i].wrong ? "var(--bad)" : ownerColor(tl[i].owner);   // a missed guess reads red, not as a trophy
      slotsHTML += `<div class="placed"${oc?` style="border-color:${oc}"`:``}><div class="yr"${oc?` style="color:${oc}"`:``}>${tl[i].year}</div>
        <div><div class="ti">${esc(tl[i].name)}</div><div class="ar">${esc(tl[i].artist)}</div></div></div>`;
    }
  }

  const medals = ["🥇","🥈","🥉"];
  const ranked = S.players.map((pp,i)=>({pp,i}))
    .sort((a,b)=> b.pp.timeline.length - a.pp.timeline.length);
  const lbHTML = ranked.map((e)=>{
    const score = e.pp.timeline.length;
    const rank = ranked.filter(x => x.pp.timeline.length > score).length;
    const pct = S.target ? Math.min(100, Math.round(score/S.target*100)) : 0;
    return `<div class="lb2-row ${e.i===S.turn?'me':''}">
      <span class="lb2-rank">${medals[rank]||(rank+1)}</span>
      <span class="lb2-nm">${esc(e.pp.name)}</span>
      <span class="lb2-bar"><span class="lb2-fill" style="width:${pct}%"></span></span>
      <span class="lb2-sc">${score}/${S.target}</span>
    </div>`;
  }).join("");

  const survival = S.mode==="survival";
  const run = isRun();
  const hearts = "❤️".repeat(Math.max(0,S.lives)) + "🖤".repeat(Math.max(0,3-S.lives));
  const runSquares = run ? (p.results||[]).map(r=>r?'🟩':'🟥').join('') + '⬛'.repeat(Math.max(0, RUN_LEN - (p.results||[]).length)) : '';
  const hud = survival
    ? `<div class="lb2"><div class="lb2-row me" style="justify-content:space-between; gap:8px">
         <span style="font-size:17px; letter-spacing:2px; flex:0 0 auto">${hearts}</span>
         <span class="lb2-sc" style="min-width:auto; flex:1; text-align:center"><b style="color:var(--text); font-size:15px">${S.score}</b> placed · streak ${S.streak}</span>
         <span class="lb2-sc" style="flex:0 0 auto">best ${(loadBest().cards||0)}</span>
       </div></div>`
    : run
    ? (S.players.length>1
      ? `<div class="lb2"><div class="lb2-row me" style="justify-content:space-between; gap:8px">
           <span style="flex:1; font-size:13px">${S.players.map((pl,i)=>`<span style="color:${ownerColor(i)}; font-weight:700; margin-right:10px">● ${esc(pl.name)} ${pl.hits||0}/${RUN_LEN}</span>`).join("")}</span>
           <span class="lb2-sc" style="flex:0 0 auto">song ${Math.min((p.tries||0)+1, RUN_LEN)}/${RUN_LEN}</span>
         </div></div>`
      : `<div class="lb2"><div class="lb2-row me" style="justify-content:space-between; gap:8px">
           <span style="font-size:16px; letter-spacing:2px; flex:0 0 auto">${runSquares}</span>
           <span class="lb2-sc" style="min-width:auto; flex:1; text-align:right">song <b style="color:var(--text)">${Math.min((p.tries||0)+1, RUN_LEN)}/${RUN_LEN}</b> · score ${p.hits||0}</span>
         </div></div>`)
    : `<div class="lb2">${lbHTML}</div>`;

  app().innerHTML = `
    <div class="topbar">
      <div>
        <div class="eyebrow">${survival ? 'survival · solo' : S.mode==="daily" ? 'daily challenge #'+dailyNumber() : S.mode==="challenge" ? 'friend challenge' : run ? 'turbo' : 'now placing'}</div>
        <div class="turn-name">${survival ? 'Keep the run alive' : run ? (S.players.length>1 ? esc(p.name) : 'Lock it in') : esc(p.name)}</div>
      </div>
      <button class="btn sm ghost" onclick="confirmQuit()">Quit</button>
    </div>
    ${hud}

    <div class="stage" style="margin-top:14px">
      <div class="eq ${vizEnabled?'viz':''} ${S.playing?'':'paused'}"><span></span><span></span><span></span><span></span><span></span></div>
      <h2>${S.checkingTrack ? 'Checking track…' : (live ? 'Mystery track is playing' : '…')}</h2>
      <p>${S.checkingTrack ? (S.checkMessage || 'We’re checking the result now.') : 'Listen, then drop it into your timeline where it belongs.'}</p>
      ${S.checkingTrack ? `<div class="verify-state">still checking</div>` : ''}
    </div>

    <div class="controls">
      <button class="btn" id="ppBtn" onclick="togglePlay()">${S.playing ? '❚❚&nbsp; Pause' : '▶&nbsp; Play'}</button>
    </div>

    <div style="height:18px"></div>
    <p class="tl-label">${run ? (S.players.length>1 ? 'Shared timeline' : 'Your timeline') : survival ? 'Your timeline' : esc(p.name)+'’s timeline'} — tap a gap to place</p>
    ${tl.length? `<div class="timeline">${slotsHTML}</div>` : `<div class="empty-tl">No cards yet.</div>`}
    <div class="footnote">Oldest first · reads left → right, top → bottom</div>
  `;
}

async function recheckOverlay(){
  const p = S.players[S.turn];
  if(!S.current || S.pendingSlot === null || !p) return;
  showCheckingState("Re-checking this track…");
  await new Promise(resolve => setTimeout(resolve, 260));
  const correct = slotCorrect(p, S.pendingSlot);
  if(correct && !p.timeline.some(c => c.id === S.current.id)){
    p.timeline.push(S.current);
    p.timeline.sort((a,b)=>a.year-b.year);
  } else if(!correct && p.timeline.some(c => c.id === S.current.id)){
    p.timeline = p.timeline.filter(c => c.id !== S.current.id);
  }
  S.checkingTrack = false;
  S.checkMessage = "";
  overlayReveal(correct, p);
}

function overlayReveal(correct, p){
  const c = S.current;
  const survival = S.mode==="survival";
  const run = isRun();
  const dead = survival && S.lives <= 0;
  const reached = !survival && !run && correct && p.timeline.length >= S.target;      // this player just hit the target
  const anyFinished = !survival && !run && S.players.some(pl => pl.timeline.length >= S.target);
  const won = anyFinished && raceOver();   // nobody left who can still tie → results
  const sheet = document.getElementById("sheet");
  S.checkingTrack = false;
  S.checkMessage = "";
  const missHint = !correct ? correctRange(p, c) : "";
  // data-correction is collapsed and saves for NEXT time only — it can't flip this result
  const flagBlock = `<details class="report-yr"><summary>🚩 Wrong year in our data?</summary>
        <div class="year-fix" style="margin-top:8px;"><span class="muted" style="font-size:11px">correct year</span>
          <input class="rev-yr" type="number" inputmode="numeric" value="${c.year}"
            onchange="saveYear('${c.id}', this.value); toast('Thanks — fixed for next time.')" /></div>
        ${REPORT.url ? `<button class="btn ghost sm" style="margin-top:8px" onclick="reportYear('${c.id}', ${c.year})">📤 Report this fix so everyone gets it</button>` : ``}
      </details>`;
  let sub, btn;
  if(survival){
    const hearts = "❤️".repeat(Math.max(0,S.lives)) + "🖤".repeat(Math.max(0,3-S.lives));
    sub = correct ? `${S.score} placed · streak ${S.streak}` : (dead ? `Out of lives` : `Lost a life`);
    btn = dead ? '💀 See results' : 'Next song →';
    var extra = `<div style="font-size:22px; letter-spacing:3px; margin:14px 0 4px">${hearts}</div>`;
  } else if(run){
    sub = `${correct ? 'Locked in place' : 'Locked at its true spot'} · song ${p.tries||0}/${RUN_LEN} · score ${p.hits||0}`;
    const allDone = S.players.every(pl => (pl.tries||0) >= RUN_LEN);
    let nxtName = null;
    if(!allDone && S.players.length>1){
      let t = S.turn;
      do{ t = (t+1) % S.players.length; } while((S.players[t].tries||0) >= RUN_LEN);
      if(t !== S.turn) nxtName = S.players[t].name;
    }
    btn = allDone ? '🏁 See results' : (nxtName ? '▶ Pass to '+esc(nxtName)+' →' : 'Next song →');
    var extra = `<div style="font-size:19px; letter-spacing:2px; margin:12px 0 4px">${(p.results||[]).map(r=>r?'🟩':'🟥').join('')}${'⬛'.repeat(Math.max(0,RUN_LEN-(p.results||[]).length))}</div>${flagBlock}`;
  } else {
    sub = reached ? '🏁 '+esc(p.name)+' hits '+S.target+'!'+(won?'':' Last chance for anyone one card short.')
        : anyFinished ? (correct?'Card goes to '+esc(p.name):'Card is discarded')+' · 🏁 final chance'
        : (correct?'Card goes to '+esc(p.name):'Card is discarded');
    let nxt = S.players[(S.turn+1) % S.players.length];
    if(anyFinished && !won){
      for(let t=S.turn+1; t<S.players.length; t++){
        if(S.players[t].timeline.length === S.target-1){ nxt = S.players[t]; break; }
      }
    }
    btn = won ? '🏆 See results' : (S.players.length>1 ? '▶ Pass to '+esc(nxt.name)+' →' : 'Next turn →');
    var extra = flagBlock;
  }
  sheet.innerHTML = `

/* ---------- run results (turbo / daily / challenge) ---------- */
function overlayRunOver(){
  S.current = null;
  renderGame();   // repaint the final board behind the results (last card included)
  const daily = S.mode==="daily", chal = S.mode==="challenge";
  const solo = S.players.length===1;
  const me = S.players[0];
  const squares = pl => (pl.results||[]).map(r=>r?'🟩':'🟥').join('') + '⬛'.repeat(Math.max(0, RUN_LEN - (pl.results||[]).length));
  const sheet = document.getElementById("sheet");

  // multiplayer turbo: ranked results
  if(!solo){
    // score first; equal scores are decided by the fastest total thinking time
    const ranked = [...S.players].sort((a,b)=>((b.hits||0)-(a.hits||0)) || ((a.timeMs||0)-(b.timeMs||0)));
    const top = ranked[0];
    const tieBroken = ranked.length>1 && (ranked[0].hits||0)===(ranked[1].hits||0);
    const rows = ranked.map(pl=>{
      const oc = ownerColor(S.players.indexOf(pl));
      return `<div style="font-size:14px; margin:5px 0">${pl===top?'🏆 ':''}<span style="color:${oc}; font-weight:700">● ${esc(pl.name)}</span> — <b>${pl.hits||0}/${RUN_LEN}</b> · ${fmtTime(pl.timeMs)} <span style="font-size:12px; letter-spacing:1px">${squares(pl)}</span></div>`;
    }).join("");

    sheet.innerHTML = `
      <div class="winner-emoji">⚡</div>
      <div class="verdict good" style="margin-top:6px">${esc(top.name)} WINS</div>
      ${tieBroken ? `<div class="muted" style="font-size:12.5px; margin-top:4px">tie — fastest time decides ⏱</div>` : ``}
      <div style="margin:14px 0 16px">${rows}</div>

      <button class="btn ghost" style="margin-top:8px" onclick="backToSetup()">Back to menu</button>
    `;
    document.getElementById("overlay").classList.add("show");
    return;
  }

  const score = me.hits||0;
  const perfect = score === RUN_LEN;
  const setIdx = (S.challenge && S.challenge.idx) || S.runCards;
  const mine = !(S.challenge && S.challenge.idx);   // own run (daily/turbo/fresh) vs an incoming link
  if(setIdx && setIdx.length>=2 && !chalPlayed(setIdx)) recordChal(setIdx, score, me.timeMs||0, mine);
  let streakLine = "", title = 'TURBO RUN';
  if(daily){
    title = 'DAILY #'+dailyNumber();
    const d = loadDaily();
    if(d.last !== localDay(0)){
      const streak = (d.last === localDay(-1)) ? (d.streak||0)+1 : 1;
      saveDaily({ last: localDay(0), streak, best: Math.max(score, d.best||0),
                  score, results: (me.results||[]).slice(), num: dailyNumber(),
                  idx: (S.runCards && S.runCards.length>=2) ? S.runCards : null,
                  timeMs: me.timeMs||0 });
    }
    streakLine = `<div style="font-size:15px; margin:6px 0 2px">🔥 streak · <b>${loadDaily().streak||1}</b> day${(loadDaily().streak||1)===1?'':'s'}</div>`;
  } else if(chal){
    title = 'CHALLENGE';
    const beat = S.challenge && S.challenge.beat;
    const beatT = S.challenge && S.challenge.beatTime;
    const myT = me.timeMs||0;
    if(beat!=null){
      if(score > beat) streakLine = `<div style="color:var(--good); font-weight:700; font-size:15px; margin:6px 0">🏆 You beat their ${beat}/${RUN_LEN}!</div>`;
      else if(score < beat) streakLine = `<div style="color:var(--bad); font-weight:700; font-size:15px; margin:6px 0">They hold it — ${beat}/${RUN_LEN}</div>`;
      else if(beatT){   // equal score: fastest time decides
        streakLine = myT < beatT
          ? `<div style="color:var(--good); font-weight:700; font-size:15px; margin:6px 0">🏆 Tied at ${beat}/${RUN_LEN} — but you were faster! ⏱ ${fmtTime(myT)} vs ${fmtTime(beatT)}</div>`
          : myT > beatT
          ? `<div style="color:var(--bad); font-weight:700; font-size:15px; margin:6px 0">Tied at ${beat}/${RUN_LEN} — they were faster ⏱ ${fmtTime(beatT)} vs ${fmtTime(myT)}</div>`
          : `<div style="font-size:15px; margin:6px 0">🤝 Dead even — same score, same time</div>`;
      }
      else streakLine = `<div style="font-size:15px; margin:6px 0">🤝 Tied at ${beat}/${RUN_LEN}</div>`;
    }
  } else {
    const best = loadBest();
    if(score > (best.turbo||0)){ best.turbo = score; saveBest(best); streakLine = `<div style="color:var(--good); font-weight:700; font-size:14px; margin:6px 0">🎉 New turbo best!</div>`; }
  }
  buzz(perfect ? [0,30,40,30,40,90] : [0,25,40,25]);
  const canChallenge = S.runCards && S.runCards.length >= 2;
  sheet.innerHTML = `
    <div class="winner-emoji">${perfect ? '🏆' : daily ? '📅' : chal ? '🎯' : '⚡'}</div>
    <div class="verdict ${score>=3?'good':'bad'}" style="margin-top:6px">${title}</div>
    <div class="reveal-yr" style="font-size:54px; margin:8px 0 2px; color:${score>=3?'var(--good)':'var(--bad)'}">${score}/${RUN_LEN}</div>
    <div style="font-size:22px; letter-spacing:3px; margin:6px 0">${squares(me)}</div>
    <div class="muted" style="font-size:13px">⏱ ${fmtTime(me.timeMs)}</div>
    ${streakLine}
    ${daily ? `<button class="btn pink" style="margin-top:14px" onclick="shareDaily()">⚔️ Challenge friends</button>` : ``}
    ${(!daily && canChallenge) ? `<button class="btn pink" style="margin-top:8px" onclick="shareChallenge(${score})">🔗 Challenge a friend on these songs</button>` : ``}
    ${(!daily && !chal) ? `<button class="btn" style="margin-top:8px" onclick="playAgain()">⚡ Run it again</button>` : ``}
    <button class="btn ghost" style="margin-top:8px" onclick="backToSetup()">Done</button>
  `;
  document.getElementById("overlay").classList.add("show");
}

// a #c=<i0.i1...>&s=<score> link carries the exact run: indices into the stable pool
function parseChallengeHash(){
  const m = (location.hash||"").match(/c=([\d.]+)(?:&s=(\d+))?(?:&t=(\d+))?/);
  if(!m) return null;
  const idx = m[1].split(".").map(Number).filter(n => Number.isFinite(n) && n>=0);
  if(idx.length < 2) return null;
  return { idx: idx.slice(0, RUN_LEN+1), beat: m[2]!=null ? Math.min(RUN_LEN, parseInt(m[2],10)) : null,
           beatTime: m[3]!=null ? parseInt(m[3],10)*1000 : null };
}

async function startFreshChallenge(){

async function startChallenge(){
  if(!S.challenge) return;
  const prev = chalPlayed(S.challenge.idx);
  if(prev){ toast("You already played these songs — "+prev.s+"/"+RUN_LEN+". Send your result instead!"); return; }
  track(S.challenge.beat != null ? "start-challenge-incoming" : "start-challenge-fresh");
  const songs = S.challenge.idx.map(i => stablePool()[i]).filter(Boolean);
  if(songs.length < 2){ toast("This challenge link doesn't work on this version."); return; }
  S.mode = "challenge"; S.turbo = false;
  S.players = [{ name:"You", timeline:[] }];
  unlockAudio();
  S.deck = []; S.deckSeen = new Set(); S.loadingMore = false;
  renderLoading(0, songs.length);
  const got = await resolveInitial(songs, (d,t)=>renderLoading(d,t), ()=> S.deck.length >= 2);
  if(S.deck.length < 2){
    showError("Couldn't load the challenge songs — Apple may be rate-limiting. Try again in a moment.");
    renderSetup(); return;
  }
  S.used = new Set();
  startGame();
  loadRest(songs.slice(got), bgRun);
}

async function onStart(){
  let songs = selectedSongs();
  if(songs.length < 2){ toast("Pick at least one deck."); return; }
  if(S.mode==="survival"){
    const nm = (S.players[0] && (S.players[0].name||"").trim()) || "You";
    S.players = [{ name:nm, timeline:[] }];   // survival is always solo
  }
  S.players.forEach((p,i)=>{ if(!(p.name||"").trim()) p.name = "Player "+(i+1); });
  track(S.mode==="survival" ? "start-survival" : S.turbo ? "start-turbo" : "start-passplay");
  // Working set: plenty of headroom over what the game needs, randomly sampled
  // (fresh mix each game). We don't resolve it all up front — streamed in below.
  const turboRun = S.mode==="classic" && S.turbo;
  const need = S.mode==="survival" ? 90 : turboRun ? (S.players.length||1)*(RUN_LEN+1) : (S.players.length||1) * S.target;
  const cap = S.mode==="survival" ? Math.min(songs.length, 350)
            : turboRun ? Math.min(songs.length, 30 + (S.players.length||1)*15)
            : Math.max(120, Math.min(400, need * 4));
  songs = shuffle(songs.slice());
  if(songs.length > cap){ songs = songs.slice(0, cap); }
  unlockAudio();   // prime mobile audio within this tap
  // Resolve only what's needed to start — one seed card per player + the first
  // mystery track + a small cushion — then stream the rest in the background.
  // (nextTurn waits for more if the cushion ever runs dry, so this can be small.)
  S.deck = [];
  S.deckSeen = new Set();
  S.loadingMore = false;
  const FIRST = Math.min(songs.length, S.players.length + 4);   // headroom for failed lookups
  const MIN = Math.min(songs.length, S.players.length + 1);     // seeds + the first mystery track
  renderLoading(0, FIRST);
  const got = await resolveInitial(songs.slice(0, FIRST), (d,t)=>renderLoading(d,t),
    ()=> S.deck.length >= MIN);   // start as soon as the minimum is in — rest streams in below
  if(S.deck.length < 2){
    showError("Couldn't load playable previews (got "+S.deck.length+"). Apple may be rate-limiting "
      +"or the network is blocked — wait a few seconds and try again, or pick another deck.");
    renderSetup();
    return;
  }
  S.used = new Set();
  startGame();                       // bumps bgRun
  loadRest(songs.slice(got), bgRun);   // background; appends to S.deck as it goes
}

function saveYear(id, value){
  const y = parseInt(value, 10);
  if(y && y>=1860 && y<=2100){
    S.yearOverrides[id] = y;
    const card = S.deck.find(c => c.id===id);   // update the live card too, if mid-game
    if(card) card.year = y;
    // already locked on a board? resumed games hold copies, not deck references —
    // fix those too, keep each timeline sorted, and repaint so the fix is visible now
    let onBoard = false;
    (S.players||[]).forEach(p=>{
      const t = (p.timeline||[]).find(c => c.id===id);
      if(t){ t.year = y; p.timeline.sort((a,b)=>a.year-b.year); onBoard = true; }
    });
    if(onBoard){ renderGame(); saveGame(); }
  } else {
    delete S.yearOverrides[id];
  }
  store.set("tl_years", JSON.stringify(S.yearOverrides));
}

/* ---------- year checker (browser-side; uses Apple release dates) ----------
   Curated years are best-effort. This walks every distinct song across all
   decks, looks each up via iTunes, and flags where our year disagrees with
   Apple's release date by 2+ years (small single-vs-album offsets ignored).
   Overrides are keyed by the resolved iTunes track id, so they apply in-game. */
let VER = null;
function allDistinctSongs(){
  const out = [], seen = new Set();
  for(const d of allDecks()){
    for(const s of d.songs){
      const k = norm(s.title)+"|"+norm(s.artist);
      if(seen.has(k)) continue; seen.add(k);
      out.push({ deck:d.name, title:s.title, artist:s.artist, year:s.year });
    }
  }
  return out;
}
async function startVerify(){
  const songs = allDistinctSongs();
  VER = { running:true, done:0, total:songs.length, flags:[], missing:0 };
  renderVerify();
  const BATCH = 6;
  for(let i=0;i<songs.length;i+=BATCH){
    const slice = songs.slice(i, i+BATCH);
    const res = await Promise.all(slice.map(async sg => {
      const r = await itunesSearch(sg.artist+" "+sg.title, 10);
      return { sg, hit: pickBest(r, sg) };
    }));
    for(const {sg,hit} of res){
      VER.done++;
      if(!hit || !hit.previewUrl){ VER.missing++; continue; }
      const ay = yearOf(hit.releaseDate);
      if(ay && Math.abs(ay - sg.year) >= 2){
        VER.flags.push({ ...sg, apple:ay, id:"it"+hit.trackId });
      }
    }
    renderVerify();
  }
  VER.running = false;
  VER.flags.sort((a,b)=> Math.abs(b.apple-b.year) - Math.abs(a.apple-a.year));
  renderVerify();
}
function exitVerify(){ VER = null; renderSetup(); }
function renderVerify(){
  if(!VER){ renderSetup(); return; }
  const pct = VER.total ? Math.round(VER.done/VER.total*100) : 0;
  let body;
  if(VER.running){
    body = `<div class="loadwrap">
      <div class="eq"><span></span><span></span><span></span><span></span><span></span></div>
      <h2 class="display" style="font-size:22px; margin:14px 0 4px">Checking years…</h2>
      <p class="muted" style="font-size:13px">${VER.done}/${VER.total} · ${VER.flags.length} flagged so far</p>
      <div class="loadbar"><span class="loadfill" style="width:${pct}%"></span></div>
    </div>`;
  } else {
    const rows = VER.flags.map(f=>`
      <div class="res-row">
        <div class="res-meta"><div class="res-ti">${esc(f.title)}</div><div class="res-ar">${esc(f.artist)} · ${esc(f.deck)}</div></div>
        <div style="text-align:center; font-size:10px; color:var(--muted); flex:0 0 auto">deck<br><b style="color:var(--text); font-size:15px">${f.year}</b></div>
        <div style="text-align:center; font-size:10px; color:var(--muted); flex:0 0 auto">Apple<br><b style="color:var(--cyan); font-size:15px">${f.apple}</b></div>
        <input type="number" inputmode="numeric" value="${f.year}" onchange="saveYear('${f.id}', this.value); toast('Saved '+this.value)"
          style="width:74px; flex:0 0 auto; text-align:center; font-family:'Anton'; font-size:18px; color:var(--gold); padding:8px 4px" />
      </div>`).join("");
    body = `
      <div class="card">
        <div class="muted" style="font-size:13px">Checked <b style="color:var(--text)">${VER.total}</b> songs · <b style="color:var(--bad)">${VER.flags.length}</b> disagree with Apple by 2+ years${VER.missing?` · ${VER.missing} had no preview`:''}.</div>
        <div class="hint">Whatever you type is saved as an override and used in-game. Apple's date can also be wrong (remasters/comps), so set the real <b>original-release</b> year — don't just trust the Apple column.</div>
      </div>
      ${VER.flags.length ? `<div class="res-list">${rows}</div>` : `<div class="empty-tl">No big disagreements found 🎉</div>`}
    `;
  }
  app().innerHTML = `
    <div class="topbar">
      <div class="turn-name" style="font-size:24px">Year check</div>
      <button class="btn sm ghost" onclick="exitVerify()" ${VER.running?'disabled':''}>Done</button>
    </div>
    ${body}`;
}

function confirmQuit(){ if(confirm("Quit this game and return to setup?")) backToSetup(); }
function playAgain(){
  closeOverlay();
  S.players.forEach(p=>p.timeline=[]);
  S.used=new Set(); S.current=null;
  startGame();
}
function backToSetup(){ bgRun++; S.loadingMore=false; clearGame(); closeOverlay(); S.current=null; const a=aud(); if(a) a.pause(); S.playing=false; renderSetup(); }

/* ---------- boot ---------- */
/* Arriving on a playable challenge link: don't make the guest hunt for the
   card on the setup screen — greet them with one big Accept. The tap doubles
   as the audio-unlock gesture, which is why we can't just auto-start. */
function overlayChallengeInvite(){
  const beat = S.challenge.beat;
  const sheet = document.getElementById("sheet");
  sheet.innerHTML = `
    <div class="winner-emoji">🎯</div>
    <div class="verdict" style="color:var(--cyan)">YOU'VE BEEN CHALLENGED</div>
    <div class="muted" style="font-size:13.5px; line-height:1.5">${beat != null
      ? `A friend scored <b style="color:var(--text)">${beat}/${RUN_LEN}</b>${S.challenge.beatTime ? ` in ${fmtTime(S.challenge.beatTime)}` : ``} — beat them on the same ${RUN_LEN} songs.`
      : `${RUN_LEN} songs, picked by a friend.`} One shot, the clock counts ⏱</div>
    <button class="btn primary" style="margin-top:16px" onclick="closeOverlay(); startChallenge();">▶ Accept challenge</button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="closeOverlay()">Not now</button>`;
  document.getElementById("overlay").classList.add("show");
}
function boot(){
  S.challenge = parseChallengeHash();
  if(S.challenge) track("open-challenge-link");   // a shared link actually landed
  try{ S.yearOverrides = JSON.parse(store.get("tl_years")||"{}"); }catch(e){ S.yearOverrides = {}; }
  try{ S.customDecks = JSON.parse(store.get("tl_decks")||"[]")||[]; }catch(e){ S.customDecks = []; }
  S.selectedIds = DECKS[0] ? [DECKS[0].id] : [];
  renderSetup();
  if(S.challenge && !chalPlayed(S.challenge.idx)) overlayChallengeInvite();
}
boot();
</script>

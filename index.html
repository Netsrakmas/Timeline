<script data-goatcounter="https://yearworm.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
<style>
  :root{
    /* 4.0 "tabbed lobby" palette — from the artifact design (amber & cyan) */
    --bg:#0B1120; --s1:#121A2E; --s2:#18223A; --s3:#212C4A;
    --ink:var(--bg); --surface:var(--s1); --surface-2:var(--s2);   /* legacy aliases */
    --line:rgba(255,255,255,.08);
    --gold:#F6B93B; --cyan:#5EE0D6; --violet:#A78BFA;
    --text:#EEF2FF; --muted:#8EA0C9; --faint:#5A6A92;
    --good:#4ADE80; --bad:#FF6B6B; --orange:#FF9F45;
    --glow-gold:rgba(246,185,59,.16);
    --glow-cyan:rgba(94,224,214,.10);
    --mono:"DM Mono",ui-monospace,monospace;
    --r:14px; --r-ctl:12px; --r-card:18px; --r-hero:18px; --r-sheet:22px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  /* The decorative glows live on a fixed, viewport-sized layer ("stage lights").
     On the body they were sized/positioned against the DOCUMENT height, so they
     tiled on long pages and jumped whenever the content grew or shrank
     (add/remove player, resume card). A fixed layer is anchored to the screen. */
  body{
    margin:0; min-height:100%;
    background:#05070F;
    color:var(--text);
    font-family:"Rubik",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(140% 90% at 50% -10%, #14213D 0%, #0B1120 45%, #05070F 100%);
  }
  #app{max-width:440px; margin:0 auto; min-height:100%;
    padding:max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(40px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));}
  .display{font-family:"Anton",sans-serif; font-weight:400; letter-spacing:.5px; line-height:.95;}
  /* eyebrows are quiet by default — color is earned (daily=gold, online=cyan) */
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:700;}
  .muted{color:var(--muted);}
  h1.brand{font-family:"Rubik",sans-serif; font-weight:900; font-size:clamp(32px,10vw,40px); margin:0; letter-spacing:-1px; line-height:.95;
    background:linear-gradient(100deg, var(--gold), var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 18px rgba(255,194,75,.08);}
  .tag{color:var(--muted); font-size:14px; margin-bottom:22px; line-height:1.5;}
  /* flat surface, no stroke — the s1-vs-bg delta carries the edge; the
     transparent border keeps inline border-color accents (hero/chal) working */
  .card{background:var(--s1); border:1px solid transparent; border-radius:var(--r-card); padding:18px;}
  /* the daily ritual hero — the ONE loud card on the setup screen */
  /* one filled-gold per view: inner buttons of hero/friends stay quiet —
     the sticky Start bar is the screen's primary */
  #friendsCard .btn.primary{background:var(--s2); color:var(--gold);}
  .card + .card{margin-top:16px;}
  /* the news card lives inside a wrapper div, so the sibling rule misses it */
  #chalNews .card{margin-bottom:16px;}
  #friendsCard .card{margin-top:16px;}   /* same wrapper-div blind spot */
  #friendsCard + .card{margin-top:16px;} /* …and the card FOLLOWING the wrapper (resume card) */
  label.fld{display:block; font-size:13px; color:var(--muted); margin:0 0 7px; letter-spacing:.02em;}
  input[type=text], input[type=number], input:not([type]){
    width:100%; background:var(--bg); border:1px solid transparent; color:var(--text);
    border-radius:var(--r-ctl); padding:13px 14px; font:inherit; font-size:15px; outline:none;
  }
  input[type=text]:focus, input[type=number]:focus, input:not([type]):focus{border-color:var(--gold);}
  input::placeholder{color:var(--faint);}
  .row{display:flex; gap:10px; align-items:center;}
  .row.wrap{flex-wrap:wrap;}
  button{font:inherit; cursor:pointer; border:none; border-radius:var(--r-ctl); font-weight:700; letter-spacing:.01em;}
  /* hierarchy: ONE filled-gold primary per view; secondaries are quiet s2
     surfaces (no stroke); ghosts are text-only. .pink marks send/challenge
     energy — gold text on a quiet surface, never a second filled primary. */
  /* chess.com-style tactile bevels: a hard same-hue-darker bottom edge that
     compresses on press — no blur, no gradient */
  .btn{padding:14px 16px; background:var(--s2); color:var(--text); border:1px solid transparent;
    border-bottom:4px solid #0A0E1C; width:100%; min-height:48px;}
  .btn:active{transform:translateY(2px); border-bottom-width:2px;}
  .btn.primary{background:var(--gold); color:#231500; border:none; border-bottom:4px solid #B8862F;}
  .btn.pink{background:var(--cyan); color:#00303F; border:none; border-bottom:4px solid #3FA8C6;}
  .btn.ghost{background:transparent; color:var(--muted); border-bottom-color:transparent;}
  .btn.ghost:active{transform:none; border-bottom-width:4px;}
  .btn:hover{filter:brightness(1.06);}
  .btn.sm{padding:10px 12px; font-size:13px; width:auto; min-height:40px;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}
  .hint{font-size:13.5px; color:var(--muted); margin-top:9px; line-height:1.55;}
  .pill{display:inline-flex; align-items:center; gap:7px; font-size:12px; padding:6px 11px; border-radius:99px;
    border:1px solid var(--line); background:var(--surface);}
  .dot{width:8px; height:8px; border-radius:99px; background:var(--muted);}
  .dot.on{background:var(--good); box-shadow:0 0 10px var(--good);}
  .players-list{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .players-list .row input{flex:1;}
  .iconbtn{width:44px; height:44px; padding:0; flex:0 0 auto; display:grid; place-items:center; font-size:18px;}
  /* in input rows the ✕ stretches to exactly the input's height, so the two
     rounded rects align pixel-perfect instead of the 44px button floating */
  .row:has(> input) { align-items:stretch; }
  .row:has(> input) .iconbtn{ height:auto; }
  /* a search result that's in the deck — instant feedback where you tapped */
  .btn.added{background:linear-gradient(180deg,#FFDE93,var(--gold)); color:#2A1A00; border:none; opacity:1; cursor:default;}
  /* the start button rides along while you scroll — docked on a fade so it
     never reads as a stray button floating on top of the deck chips */
  .startbar{position:sticky; bottom:0; z-index:5; margin:16px -6px 0; padding:12px 6px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(7,10,19,0), rgba(7,10,19,.94) 45%);}
  /* the sticky Start button IS the screen's one filled-gold primary */
  .startbar .btn{background:var(--gold); color:#231500; border-bottom:4px solid #B8862F;}
  /* concept-C chrome: identity avatars, the daily #N block, playlist deck
     tiles, and the bottom tab bar (setup screen only — it lives inside #app) */
  .avatar{display:inline-grid; place-items:center; width:38px; height:38px; border-radius:50%; overflow:hidden;
    background:var(--s2); border:2px solid var(--line); font-size:17px; flex:0 0 auto; font-weight:800;}
  .avatar.me{border-color:var(--gold); color:var(--gold);}
  .avatar.sm{width:27px; height:27px; font-size:15px; border-width:1px;}
  .avatar svg{width:100%; height:100%; display:block;}
  .vs{font-size:10px; font-weight:800; color:var(--faint); letter-spacing:.08em; flex:0 0 auto;}
  /* ===== 4.0 tabbed lobby ===== */
  .mono{font-family:var(--mono);}
  /* fixed bottom nav — Play / Friends / Ranks / Profile */
  .tabbar{position:fixed; left:50%; transform:translateX(-50%); bottom:0; z-index:8; width:100%; max-width:440px; display:flex;
    background:rgba(9,13,25,.92); backdrop-filter:blur(12px); border-top:1px solid var(--line);
    padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none;
    color:var(--muted); font-size:10.5px; font-weight:700; letter-spacing:.3px; padding:6px 0; position:relative; min-height:48px;}   /* --muted, not --faint: functional labels need ≥4.5:1 */
  .tab.on{color:#fff;}
  .tab .tico{font-size:21px; line-height:1; opacity:.55;}
  .tab.on .tico{opacity:1;}
  .tab .tbadge{position:absolute; top:0; right:calc(50% - 24px); background:var(--cyan); color:#04322E;
    font-size:10px; font-weight:800; min-width:16px; height:16px; border-radius:99px; display:grid; place-items:center; padding:0 4px;}
  #app.tabbed{padding-bottom:calc(90px + env(safe-area-inset-bottom));}
  /* mode list (Play tab home) */
  .modelist{display:grid; gap:12px; margin-top:16px;}
  .modecard{text-align:left; cursor:pointer; border:1px solid var(--line);
    background:linear-gradient(rgba(255,255,255,.043), rgba(255,255,255,.016));
    border-radius:18px; padding:15px 16px; display:flex; align-items:center; gap:14px; color:var(--text); width:100%; font:inherit;
    transition:border-color .15s, transform .06s;}
  .modecard:active{transform:scale(.99);}
  .modeicon{width:46px; height:46px; flex:0 0 auto; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:23px;}
  .modecard .mmid{flex:1; min-width:0;}
  .modecard .mtitle{font-weight:800; font-size:17px; display:flex; align-items:center; gap:8px;}
  .modecard .mdesc{color:var(--muted); font-size:12.5px; margin-top:2px; line-height:1.35;}
  .modecard .mchev{color:var(--faint); font-size:22px; font-weight:300;}
  .badge{font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:3px 7px;
    border-radius:20px; background:rgba(255,255,255,.08); color:#B9C6EA; font-weight:400;}
  .badge.live{background:rgba(94,224,214,.16); color:var(--cyan);}
  .badge.hot{background:rgba(246,185,59,.16); color:var(--gold);}
  /* lobby header (wordmark + spinning vinyl) */
  .lobbyhead{display:flex; align-items:center; gap:12px; margin:8px 0 4px;}
  .vinyl{width:54px; height:54px; border-radius:50%; flex:0 0 auto;
    background:repeating-radial-gradient(circle, #0C1122 0 2px, #1A2340 2px 4px);
    box-shadow:0 0 0 3px #05070F, 0 0 0 5px var(--gold);
    display:flex; align-items:center; justify-content:center; animation:yw-spin 6s linear infinite;}
  .vinyl i{width:16px; height:16px; border-radius:50%; background:var(--gold); display:block;}
  @keyframes yw-spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion: reduce){ .vinyl,.gvinyl{animation:none !important;} }
  /* the in-game mystery record — the signature moment of the play screen. A proper
     spinning vinyl: fine grooves + a rotating light glint (::before streak, ::after
     soft sheen) + the gold→cyan Yearworm label with a spindle hole. Grooves alone are
     radially symmetric and read as static, so the glint + label carry the motion. */
  .gvinyl{width:120px; height:120px; border-radius:50%; margin:0 auto 18px; position:relative;
    background:repeating-radial-gradient(circle at 50% 50%, #05070F 0 2px, #12182B 2px 4px);
    box-shadow:0 0 0 3px #05070F, 0 12px 32px rgba(0,0,0,.55), inset 0 0 20px rgba(0,0,0,.55);
    display:flex; align-items:center; justify-content:center; animation:yw-spin 3.5s linear infinite;}
  .gvinyl.paused{animation-play-state:paused;}
  .gvinyl::before{content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:linear-gradient(118deg, rgba(255,255,255,0) 42%, rgba(255,255,255,.15) 49%, rgba(255,255,255,.03) 53%, rgba(255,255,255,0) 62%);}
  .gvinyl::after{content:""; position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:conic-gradient(from -50deg, rgba(255,255,255,0) 0deg, rgba(255,255,255,.06) 40deg, rgba(255,255,255,0) 120deg, rgba(255,255,255,0) 250deg, rgba(255,255,255,.05) 300deg, rgba(255,255,255,0) 340deg);}
  .gvinyl .glabel{position:relative; z-index:1; width:42px; height:42px; border-radius:50%;
    background:linear-gradient(135deg, var(--gold), var(--cyan)); box-shadow:0 1px 4px rgba(0,0,0,.55), inset 0 0 6px rgba(255,255,255,.18);}
  .gvinyl .glabel::after{content:""; position:absolute; left:50%; top:50%; width:6px; height:6px; border-radius:50%;
    transform:translate(-50%,-50%); background:#05070F; box-shadow:0 0 0 2px rgba(0,0,0,.35);}
  .subtag{font-family:var(--mono); font-size:10.5px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:3px;}
  .lobby-intro{color:var(--muted); font-size:14px; line-height:1.5; margin:18px 4px 8px; text-align:center; text-wrap:pretty;}
  /* screen title bar for tab pages + config screens */
  .screenhd{display:flex; align-items:center; gap:12px; margin:6px 0 16px;}
  .screenhd h2{font-family:"Rubik"; font-weight:800; font-size:22px; margin:0; flex:1;}
  .backbtn{background:var(--s2); border:1px solid var(--line); color:var(--text); width:40px; height:40px; border-radius:12px; font-size:18px; flex:0 0 auto;}
  /* Profile identity header: big avatar (tap to change) + inline-editable name */
  .idcard{display:flex; align-items:center; gap:14px;}
  .pfpwrap{position:relative; flex:0 0 auto; padding:0; border:none; background:none; cursor:pointer; line-height:0; border-radius:50%;}
  .pfp{width:64px; height:64px; border-radius:50%; overflow:hidden; display:grid; place-items:center;
    font-size:31px; font-weight:800; color:var(--gold); background:var(--s2); border:2px solid var(--gold); line-height:1;}
  .pfp svg{width:100%; height:100%; display:block;}
  .pfp-edit{position:absolute; right:-2px; bottom:-2px; width:22px; height:22px; border-radius:50%;
    display:grid; place-items:center; font-size:11px; color:var(--bg); background:var(--gold);
    border:2px solid var(--s1); line-height:1;}
  .idmeta{flex:1; min-width:0;}
  .namerow{display:flex; align-items:center; gap:8px;}
  input.nameinput{background:none; border:none; border-bottom:1px solid transparent; padding:0 0 3px; flex:1; min-width:0;
    color:var(--text); font:inherit; font-size:21px; font-weight:800; outline:none; border-radius:0;}
  input.nameinput:focus{color:var(--gold); border-bottom-color:var(--gold);}
  .nameedit{flex:0 0 auto; width:30px; height:30px; border-radius:9px; display:grid; place-items:center; cursor:pointer;
    font-size:13px; color:var(--muted); background:var(--s2); border:1px solid var(--line);}
  .nameedit:active{transform:scale(.94);}
  .idsub{font-size:11.5px; margin-top:8px;}
  /* profile stats: a real grid — 3 columns, rows always line up */
  .statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px 8px; text-align:center;}
  .statgrid .sv{font-family:var(--mono); font-size:20px; font-weight:700; color:var(--gold);}
  .statgrid .sl{font-size:10px; letter-spacing:.06em; text-transform:uppercase; margin-top:3px; color:var(--muted);}
  /* achievements: compact 3-up tiles (30 badges — rows would be a scroll marathon) */
  .achgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .ach{display:flex; flex-direction:column; align-items:center; gap:4px; padding:11px 6px 9px;
    border-radius:12px; background:var(--s2); border:1px solid var(--line); cursor:pointer;
    font:inherit; color:var(--text);}
  .ach:not(.done){opacity:.72;}
  .ach.done{border-color:rgba(246,185,59,.45); background:rgba(246,185,59,.10); opacity:1;}
  .ach .aicon{font-size:22px; line-height:1;}
  .ach .aname{font-size:10.5px; font-weight:700; text-align:center; line-height:1.25;}
  .ach .aprog{font-family:var(--mono); font-size:9.5px; color:var(--muted);}
  .ach.done .aprog{color:var(--good);}
  /* avatar picker grid (in the sheet) */
  .avgrid{display:grid; grid-template-columns:repeat(6,1fr); gap:8px;}
  .avopt{aspect-ratio:1; font-size:23px; line-height:1; border-radius:12px; display:grid; place-items:center; cursor:pointer;
    background:var(--s2); border:1px solid var(--line); transition:transform .08s ease, border-color .12s ease;}
  .avopt:active{transform:scale(.9);}
  .avopt.sel{border-color:var(--gold); background:rgba(246,185,59,.16);}
  /* generated-musician picker: SVG fills a rounded tile */
  .avgrid.muso{gap:9px;}
  .avgrid.muso .avopt{overflow:hidden; padding:0; border-radius:50%;}
  .avgrid.muso .avopt svg{width:100%; height:100%; display:block;}
  .avgrid.muso .avopt.sel{box-shadow:0 0 0 2px var(--gold); border-color:var(--gold);}
  /* segmented 2-up mode toggle */
  .duo .diff{flex:1; flex-direction:column; align-items:flex-start; gap:3px; padding:11px 13px;}
  .duo .diff .dcards{font-size:11px;}
  /* game length as one wrapping chip row */
  .diffs.chips{flex-direction:row; flex-wrap:wrap; gap:8px;}
  .chips .diff{flex:0 0 auto; width:auto; border-radius:999px; padding:10px 14px;}
  .chips .diff .dname{font-size:13.5px;}
  .card.slim{padding:13px 15px;}
  /* connection-trouble banner — unobtrusive, slides down from the top, auto-hides */
  .netbanner{position:fixed; left:50%; top:calc(8px + env(safe-area-inset-top)); transform:translate(-50%,-140%);
    z-index:20; display:flex; align-items:center; gap:8px; max-width:calc(100% - 24px);
    background:rgba(90,30,45,.96); color:#FFE1E9; border:1px solid var(--bad); border-radius:999px;
    padding:9px 16px; font-size:12.5px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.5);
    transition:transform .28s ease; pointer-events:none;}
  .netbanner.show{transform:translate(-50%,0);}
  .netdot{width:8px; height:8px; border-radius:50%; background:var(--bad); flex:0 0 auto; animation:netpulse 1s infinite;}
  @keyframes netpulse{0%,100%{opacity:1;} 50%{opacity:.25;}}
  .bufnote{margin-top:8px; font-size:12px; color:var(--muted); letter-spacing:.05em; opacity:0;
    transition:opacity .2s; height:0; overflow:hidden;}
  .bufnote.show{opacity:1; height:auto;}
  @media (prefers-reduced-motion: reduce){ .netbanner{transition:none;} .netdot{animation:none;} }
  .sect{font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; margin:32px 2px 10px; color:var(--muted);}
  .startbar .btn{box-shadow:0 6px 24px rgba(0,0,0,.55);}
  .diffs{display:flex; flex-direction:column; gap:8px;}
  .diff{display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:13px 15px; border-radius:12px; background:var(--s2); border:1px solid transparent;
    border-bottom:4px solid #0A0E1C;
    color:var(--text); width:100%; text-align:left; font:inherit; font-weight:700;}
  .diff:active{transform:translateY(2px); border-bottom-width:2px;}
  .diff .dname{font-size:15px;}
  .diff .dcards{flex:0 0 auto; font-size:12px; color:var(--muted); letter-spacing:.04em; font-weight:500;}
  .diff.sel{background:var(--surface-2); border-color:var(--gold); box-shadow:none;}
  .diff.sel .dname{color:var(--gold);}

  /* DECK PICKER */
  .deck-list{display:flex; flex-direction:column; gap:8px;}
  .deck{display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:12px;
    background:var(--s2); border:1px solid transparent; color:var(--text); width:100%; text-align:left; font:inherit;}
  .deck .demoji{font-size:22px; flex:0 0 auto;}
  .deck .dmeta{flex:1; min-width:0;}
  .deck .dt{display:block; font-size:15px; font-weight:700; line-height:1.25;}
  .deck .dd{display:block; font-size:12px; color:var(--muted); font-weight:500; margin-top:3px; line-height:1.3;}
  .deck .dn{flex:0 0 auto; font-size:12px; color:var(--muted); font-weight:500;}
  .deck.sel{background:var(--surface-2); border-color:var(--gold); box-shadow:none;}
  .deck.sel .dt{color:var(--gold);}
  /* deck carousel — side-scrollable pages of 6 chips (2 cols × 3 rows) */
  .deck-carousel{display:flex; overflow-x:auto; scroll-snap-type:x mandatory; gap:14px;
    -webkit-overflow-scrolling:touch; padding:2px 0 4px; scrollbar-width:none;}

  .deck-page{flex:0 0 100%; scroll-snap-align:start; display:grid; grid-template-columns:1fr 1fr; gap:8px; align-content:start;}
  .car-dots{display:flex; justify-content:center; gap:6px; margin-top:11px;}
  .car-dot{width:6px; height:6px; border-radius:99px; background:var(--line); transition:.2s;}
  .car-dot.on{background:var(--gold); width:18px;}
  /* SongPop-style playlist covers: each deck tile gets its own duotone wash
     (position-keyed — content stays identical), title bold on the art */
  .dchip{display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between; gap:8px;
    padding:12px; border-radius:14px; min-height:96px; border-bottom:4px solid rgba(0,0,0,.4);
    background:var(--s2); border-top:1px solid transparent; border-left:1px solid transparent; border-right:1px solid transparent;
    color:var(--text); width:100%; text-align:left; font:inherit; min-width:0;}
  .dchip:active{transform:translateY(2px); border-bottom-width:2px;}
  .deck-page .dchip:nth-child(6n+1){background:linear-gradient(160deg,#3A2E14,#161D33 75%);}
  .deck-page .dchip:nth-child(6n+2){background:linear-gradient(160deg,#14263A,#161D33 75%);}
  .deck-page .dchip:nth-child(6n+3){background:linear-gradient(160deg,#3A1420,#161D33 75%);}
  .deck-page .dchip:nth-child(6n+4){background:linear-gradient(160deg,#0F3330,#161D33 75%);}
  .deck-page .dchip:nth-child(6n+5){background:linear-gradient(160deg,#2A143A,#161D33 75%);}
  .dchip .de{font-size:22px; flex:0 0 auto;}
  .dchip .dm{min-width:0; width:100%;}
  .dchip .dn2{display:block; font-weight:800; font-size:13.5px; line-height:1.25;}
  .dchip .dc2{display:block; font-size:10.5px; color:var(--muted); margin-top:3px; line-height:1.3;}
  .dchip.sel{border-top-color:var(--gold); border-left-color:var(--gold); border-right-color:var(--gold);
    border-bottom-color:var(--gold); box-shadow:none;}
  .dchip.sel .dn2{color:var(--gold);}

  /* DECK BUILDER */
  .res-list{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
  .res-row{display:flex; align-items:center; gap:10px; background:var(--s2); border:1px solid transparent;
    border-radius:12px; padding:10px 12px;}
  .res-meta{flex:1; min-width:0;}
  .res-ti{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .res-ar{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .res-yr{flex:0 0 auto; font-family:"Anton"; font-size:18px; color:var(--cyan); width:54px; text-align:center;}
  .song-row{display:flex; align-items:center; gap:10px; background:var(--s2); border:1px solid transparent;
    border-radius:12px; padding:10px 12px;}
  .song-row input.yr{width:74px; flex:0 0 auto; text-align:center; font-family:"Anton"; font-size:18px;
    color:var(--gold); padding:8px 6px; -moz-appearance:textfield;}
  .song-row input.yr::-webkit-outer-spin-button, .song-row input.yr::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}

  /* GAME */
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .turn-name{font-family:"Anton"; font-size:30px; line-height:1;}
  .lb2{display:flex; flex-direction:column; gap:6px; margin-top:6px;}
  .lb2-row{display:flex; align-items:center; gap:10px; padding:8px 11px; border-radius:10px;
    border:1px solid transparent; background:var(--s1);}
  .lb2-row.me{border-color:rgba(255,200,94,.5); background:var(--s2);}
  .lb2-rank{font-size:15px; width:20px; text-align:center; flex:0 0 auto; color:var(--muted); font-weight:700;}
  .lb2-nm{font-weight:700; font-size:13px; flex:0 0 auto; width:72px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lb2-bar{flex:1; height:7px; border-radius:99px; background:var(--ink); overflow:hidden;}
  .lb2-fill{display:block; height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); border-radius:99px; transition:width .3s;}
  .lb2-sc{font-size:12px; color:var(--muted); flex:0 0 auto; min-width:42px; text-align:right;}
  .lb2-row.me .lb2-nm{color:var(--gold);}

  .stage{background:var(--s1); border:none; border-radius:var(--r-hero); padding:22px 18px; text-align:center; margin-bottom:16px;}
  .eq{display:inline-flex; gap:4px; align-items:flex-end; height:34px; margin-bottom:10px;}
  .eq span{width:5px; background:linear-gradient(180deg,var(--gold),var(--cyan)); border-radius:3px; animation:eq 1s ease-in-out infinite;}
  .eq span:nth-child(2){animation-delay:.15s} .eq span:nth-child(3){animation-delay:.3s}
  .eq span:nth-child(4){animation-delay:.45s} .eq span:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:9px}50%{height:34px}}
  .eq.paused span{animation-play-state:paused; height:9px;}
  .eq.viz span{animation:none !important;}   /* live audio drives the heights */
  .stage h2{font-family:"Anton"; font-weight:400; font-size:22px; margin:4px 0 2px; letter-spacing:.5px;}
  .stage p{margin:0; color:var(--muted); font-size:13.5px;}

  .tl-label{font-size:12px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; margin:0 0 8px;}
  .timeline{display:flex; flex-wrap:wrap; align-items:stretch; gap:6px; padding:4px 2px 12px;}
  .slot{flex:0 0 auto; width:62px; align-self:stretch; min-height:96px; border-radius:12px;
    border:1.5px dashed var(--line); background:rgba(255,255,255,.015); color:var(--muted);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 4px; transition:.15s;}
  .slot.active{border-color:var(--cyan); color:var(--cyan); background:rgba(77,212,255,.07);}
  .slot.active:active{background:rgba(77,212,255,.18);}
  .slot .ins{font-size:18px;}
  .slot .rng{font-size:11px; line-height:1.2; text-align:center;}
  .tie{flex:0 0 auto; align-self:center; color:var(--muted); font-size:15px; font-weight:700; opacity:.55; padding:0 2px;}
  .placed{flex:0 0 auto; width:104px; min-height:96px; border-radius:12px; background:var(--s2);
    border:1px solid transparent; padding:10px 9px; display:flex; flex-direction:column; justify-content:space-between;}
  .placed .yr{font-family:"Anton"; font-size:30px; color:var(--gold); line-height:.9;}
  .placed .ti{font-size:11px; line-height:1.25; max-height:42px; overflow:hidden;}
  .placed .ar{font-size:10px; color:var(--muted); margin-top:2px;}
  .empty-tl{color:var(--muted); font-size:13px; padding:14px 2px;}

  .controls{display:flex; gap:10px; margin-top:6px;}
  .controls .btn{flex:1;}
  .verify-state{margin-top:10px; font-size:12px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--cyan);}

  /* loading */
  .loadwrap{text-align:center; padding:60px 18px;}
  .loadbar{height:8px; border-radius:99px; background:var(--s2); overflow:hidden; margin:18px auto 0; max-width:280px; border:none;}
  .loadfill{display:block; height:100%; background:linear-gradient(90deg,var(--cyan),var(--gold)); border-radius:99px; transition:width .2s;}

  /* overlay */
  .overlay{position:fixed; inset:0; background:rgba(8,9,12,.72); backdrop-filter:blur(6px); display:none;
    align-items:center; justify-content:center; padding:22px; z-index:50;}
  .overlay.show{display:flex;}
  .sheet{width:100%; max-width:420px; background:var(--s1); border:1px solid transparent; border-radius:var(--r-sheet); padding:24px; text-align:center;
    max-height:88vh; max-height:88dvh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    animation:pop .22s cubic-bezier(.2,.9,.3,1.3);}
  .sheet:focus{outline:none;}
  /* sticky exit for long results sheets — Done stays visible while content scrolls */
  .sheetfoot{position:sticky; bottom:0; margin:14px -24px -24px; padding:10px 24px 16px;

  @keyframes pop{from{transform:scale(.9); opacity:0}to{transform:scale(1); opacity:1}}
  .verdict{font-family:"Anton"; font-size:34px; letter-spacing:1px; margin-bottom:4px;}
  .verdict.good{color:var(--good);} .verdict.bad{color:var(--bad);}
  .reveal-yr{font-family:"Anton"; font-size:72px; line-height:.9; margin:10px 0 2px;}
  .reveal-ti{font-size:17px; font-weight:700;}
  .reveal-ar{color:var(--muted); margin:2px 0 18px;}
  .report-yr{margin:12px 0 2px;}
  .report-yr summary{font-size:12px; color:var(--muted); cursor:pointer; list-style:none; opacity:.75;
    padding:12px 0;}   /* thumb-sized tap area without visual weight */
  .report-yr summary::-webkit-details-marker{display:none;}
  .report-yr[open] summary{opacity:1; margin-bottom:2px;}
  .year-fix{display:flex; align-items:center; justify-content:center; gap:8px;}
  .year-fix .muted{font-size:12px; letter-spacing:.12em; text-transform:uppercase;}
  .year-fix input.rev-yr{width:92px; height:46px; font-size:20px; text-align:center; -moz-appearance:textfield;}
  .year-fix input.rev-yr::-webkit-outer-spin-button, .year-fix input.rev-yr::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .winner-emoji{font-size:54px;}
  /* Google sign-in: our themed pill carries the look; the real (Google-drawn)
     button is stretched invisibly over it and takes the click */
  .gwrap{position:relative; display:inline-flex;}
  .gbtn{display:inline-flex; align-items:center; gap:9px; border:1px solid var(--line); border-radius:999px;
    padding:11px 18px; font-size:13.5px; font-weight:700; color:var(--text); background:var(--surface-2);}
  .greal{position:absolute; inset:0; opacity:.001; overflow:hidden; z-index:1;}
  .gwrap:focus-within .gbtn{border-color:var(--gold);}   /* the invisible real button carries focus */
  .frname{background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:5px 11px;
    color:var(--text); font-weight:700; font-size:13px; cursor:pointer;}

  #friendsCard button[aria-label="Share your friend code"] b{font-family:"Anton"; font-weight:400; letter-spacing:1px;}
  .frname:active{border-color:var(--gold);}
  .eyebtn{background:none; border:none; padding:0; cursor:pointer; font:inherit;}
  .ovrow{display:flex; width:100%; align-items:center; gap:10px; background:none; border:none;
    border-bottom:1px solid var(--line); padding:11px 2px; color:var(--text); cursor:pointer; font:inherit; text-align:left;}
  .ovrow:last-of-type{border-bottom:none;}
  .ovrow b{flex:1; font-size:14px;}
  .ovrow span:not(.avatar){flex:0 0 76px; text-align:right; font-size:13px;}
  #confetti{position:fixed; inset:0; pointer-events:none; z-index:55; overflow:hidden;}
  #confetti i{position:absolute; top:-4vh; width:9px; height:14px; border-radius:2px; opacity:.95;
    animation:confall linear forwards;}
  @keyframes confall{to{transform:translateY(116vh) rotate(720deg); opacity:.7;}}
  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:var(--bad); color:#fff;
    padding:11px 16px; border-radius:11px; font-size:13.5px; max-width:90%; text-align:center; z-index:60;

  .toast.show{display:block;}
  #errbar{display:none; position:fixed; top:0; left:0; right:0; z-index:70; background:#3A1418; color:#FFD9D9;
    border-bottom:1px solid var(--bad); padding:14px 16px; font-size:13.5px; line-height:1.55; white-space:pre-wrap; cursor:pointer;}
  .footnote{margin-top:26px; font-size:11.5px; color:var(--muted); text-align:center; line-height:1.6;}
  .footnote a{display:inline-block; padding:6px 2px;}   /* small links, honest tap targets */
  .card[onclick]:focus-visible, .btn:focus-visible, .slot:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  a{color:var(--cyan);}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

<div id="app"></div>
<audio id="aud" loop playsinline preload="auto"></audio>
<audio id="pre" playsinline preload="auto" muted></audio><!-- warms next turn's clip; never plays -->
<div class="overlay" id="overlay"><div class="sheet" id="sheet" role="dialog" aria-modal="true" tabindex="-1"></div></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div id="errbar" role="button" tabindex="0" onclick="this.style.display='none'"
  onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); this.style.display='none';}"></div>

"use strict";
const BUILD = "4.15.0";   // semver; keep in sync with CACHE_NAME in sw.js; shown in the footer
// geometric ✕ — a font glyph sits off-center in its em box on some devices
const XICON = '<svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true" style="display:block"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>';

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
  // a tapped notification asks us to open a specific tab. If a game is on
  // screen (no .tabbar = not in the lobby), DON'T repaint over it — runs are
  // never saved, so an instant goTab would destroy the attempt. Park the tab
  // and let the next lobby render honor it.
  navigator.serviceWorker.addEventListener('message', e=>{
    const t = e.data && e.data.yearwormTab;
    if(!t || !["play","friends","ranks","profile"].includes(t) || typeof goTab!=='function') return;
    if(document.querySelector('.tabbar')) goTab(t);
    else window._pendingTab = t;
  });
}
// Esc dismisses lobby sheets (avatar picker, standings, invite…). Never in-game:
// mid-run overlays (reveal/results) drive the game flow and must use their buttons.
document.addEventListener('keydown', e=>{
  if(e.key !== 'Escape') return;
  const ov = document.getElementById('overlay');
  if(ov && ov.classList.contains('show') && document.querySelector('.tabbar')) closeOverlay();
});
/* ---------- Web Push (notifications) ---------- */
const VAPID_PUBLIC = "BJa44HnxApm2zTubV0QUaheLtNxT5Cmyp1Tg3yZj-DdUwibFwZ3o574Pl4aeVmheAVXsrnQxZ9zCpogm0I9Csrc";
function pushSupported(){ return ('serviceWorker' in navigator) && ('PushManager' in window) && (typeof Notification !== 'undefined'); }
function pushEnabled(){ return pushSupported() && Notification.permission === 'granted' && store.get('tl_push') === '1'; }
function urlB64ToU8(b64){ const pad='='.repeat((4-b64.length%4)%4); const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); const raw=atob(s); const o=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++)o[i]=raw.charCodeAt(i); return o; }
async function enablePush(){
  if(!pushSupported()){ toast("Notifications aren't supported on this device"); return; }
  if(!loadProfile()){ toast("Claim a name first — then turn on notifications"); goTab("friends"); return; }
  let perm = Notification.permission;
  if(perm === 'default') perm = await Notification.requestPermission();
  if(perm !== 'granted'){ toast("Notifications are blocked — allow them in your browser settings"); return; }
  try{
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToU8(VAPID_PUBLIC) });
    const r = await socialPost({ action:'push-sub', sub: sub.toJSON(), tz: -new Date().getTimezoneOffset() });
    if(r && r.ok && r.body && r.body.ok){ store.set('tl_push','1'); toast("Notifications on 🔔"); }
    else toast("Couldn't turn on notifications — try again in a moment");
  }catch(e){ toast("Couldn't turn on notifications"); }
  if(_tab === 'profile') renderSetup();
}
async function disablePush(){
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub){ await socialPost({ action:'push-unsub', endpoint: sub.endpoint }); await sub.unsubscribe(); }
  }catch(e){}
  store.del('tl_push'); toast("Notifications off");
  if(_tab === 'profile') renderSetup();
}
function togglePush(){ pushEnabled() ? disablePush() : enablePush(); }

// Surface crashes instead of white-screening; the game is auto-saved each turn.
window.addEventListener("error", e => {
  try{ showError("Something glitched: "+((e&&e.message)||"unknown error")+"\nYour game is auto-saved — reload and tap Resume."); }catch(_){}
});
window.addEventListener("unhandledrejection", e => {
  try{ const r=e&&e.reason; showError("Something glitched: "+((r&&r.message)||r||"unknown error")+"\nYour game is auto-saved — reload and tap Resume."); }catch(_){}
});

/* ---------- tiny storage (degrades gracefully in sandboxes) ---------- */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};

(function buildBigDecks(){
  const seen = new Set(), pool = [];
  const key = s => (s.title+"|"+s.artist).toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
  const add = s => { const k = key(s); if(seen.has(k)) return; seen.add(k); pool.push(s); };
  for(const d of DECKS) for(const s of d.songs) add(s);   // curated decks first → their years win
  for(const s of EXTRA_SONGS) add(s);
  for(const s of PARTY_SONGS) add(s);
  const pKeys = new Set(PARTY_SONGS.map(key));
  const bucket = (lo,hi) => pool.filter(s => s.year>=lo && s.year<=hi).slice(0,600);
  DECKS.unshift(
    { id:"everything", name:"Every Era", emoji:"\u{1F30D}", desc:"1955–now", songs:pool },
    { id:"classics", name:"The Classics", emoji:"\u{1F3DB}\uFE0F", desc:"1950s\u20131989", songs:bucket(0,1989) },
    { id:"thehits", name:"The Hits", emoji:"\u2728", desc:"1990\u20132009", songs:bucket(1990,2009) },
    { id:"now", name:"Now", emoji:"\u26A1", desc:"2010\u2013now", songs:bucket(2010,9999) },
    { id:"party", name:"Party Anthems", emoji:"\u{1F389}", desc:"dance floor", songs:pool.filter(s=>pKeys.has(key(s))).slice(0,600) },
  );
  DECKS.splice(5);   // launch: show only these five decks; the themed songs remain in the pool above
})();

let _stablePool = null;
function stablePool(){
  if(_stablePool) return _stablePool;
  const every = DECKS.find(d => d.id==="everything");
  _stablePool = [...every.songs].sort((a,b)=> (norm(a.title)+"|"+norm(a.artist)) < (norm(b.title)+"|"+norm(b.artist)) ? -1 : 1);

// seeded picks from the stable pool — CLUSTERED by era: every pick (anchor
// included) lands inside a narrow year window around a seeded center. A set
// spread over the whole pool leaves decade-wide gaps where any guess scores;
// tight gaps are what make a run hard. Tune difficulty with RUN_YEAR_SPAN.
// slot 0 = the anchor card, 1..RUN_LEN = mysteries, rest = spares for failed lookups
const RUN_YEAR_SPAN = 8;   // ± years around the set's center
function seededIdx(seed, n){
  const pool = stablePool();
  const rnd = mulberry32(seed % 2147483647);
  const center = pool[Math.floor(rnd() * pool.length)].year;
  let span = RUN_YEAR_SPAN, cand = [];
  for(;;){
    cand = [];
    for(let i=0;i<pool.length;i++) if(Math.abs(pool[i].year - center) <= span) cand.push(i);
    if(cand.length >= n*4 || span > 60) break;   // sparse era: widen until there's real choice
    span += 2;
  }
  const picked = [], seen = new Set();
  while(picked.length < n && seen.size < cand.length){
    const j = cand[Math.floor(rnd() * cand.length)];
    if(seen.has(j)) continue; seen.add(j);
    picked.push(j);
  }
  return picked;
}

function recordRunProgress(){
  const me = S.players && S.players[0]; if(!me) return;
  const partial = (me.tries||0) < RUN_LEN;

                results: (me.results||[]).slice(), num: S.dailyNum || dailyNumber(),
                idx: (S.runCards && S.runCards.length>=2) ? S.runCards.slice() : null,
                timeMs: me.timeMs||0, ...(partial ? { p:1 } : {}) });
  } else if(S.mode === "challenge" && S.challenge && S.challenge.idx){
    const c = loadChals(), k = chalKey(S.challenge.idx), prev = c[k];
    if(prev && !prev.p) return;            // finished before — never downgrade
    c[k] = { s: me.hits||0, t: me.timeMs||0, m: 0, at: (prev && prev.at) || Date.now(),

// the account's stored avatar wins on a device that never picked one — one

function adoptAvatar(me){ if(me && me.avatar && !store.get("tl_avatar")) store.set("tl_avatar", me.avatar); }
async function socialGet(){
  if(!LB.url) return null;
  try{
    // POST, not GET: the device token is a bearer credential and must not
    // end up in URL/proxy logs
    const r = await fetch(LB.url+"/social", { method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ device: deviceId(), action:"state", ...(store.get("tl_avatar") ? { avatar: store.get("tl_avatar") } : {}) }) });
    if(!r.ok) return null;
    const b = await r.json();
    if(b && b.me){ saveProfile(b.me); adoptAvatar(b.me); }
    _social = b;
    feedFromInbox(b);
    return b;
  }catch(e){ return null; }
}
async function socialPost(data){
  if(!LB.url) return null;
  try{
    const r = await fetch(LB.url+"/social", { method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ device: deviceId(), ...(store.get("tl_avatar") ? { avatar: store.get("tl_avatar") } : {}), ...data }) });
    const b = await r.json().catch(()=>null);
    if(r.ok && b && b.me){ saveProfile(b.me); adoptAvatar(b.me); _social = b; feedFromInbox(b); }
    return { ok: r.ok, status: r.status, body: b };
  }catch(e){ return null; }
}
async function claimHandle(v){

  // profile has ONE stable avatar from day one (other devices adopt it)
  if(!store.get("tl_avatar")) store.set("tl_avatar", currentAvatarKey());
  const r = await socialPost({ action:"claim", handle:(v||"").trim() });
  if(!r){ toast("No connection — try again in a moment."); return false; }
  if(!r.ok){ toast(r.status===409 ? "That name is taken — try another." : "3–20 letters or numbers, please."); return false; }
  store.set("tl_nick", r.body.me.handle);   // boards and profile share one name
  renderFriendsCard(r.body);

function friendsOverview(){

    const w=f.w|0, l=f.l|0, t=f.t|0, w7=f.w7|0, l7=f.l7|0, t7=f.t7|0;

    const col = !any ? "var(--muted)" : w > l ? "var(--good)" : l > w ? "var(--bad)" : "var(--muted)";

      <span style="color:${col7}">${wk ? `${w7}–${l7}${t7?` +${t7}`:''}` : '—'}</span>

// tap a friend's name: head-to-head sheet — all-time, rolling 7 days, recent duels
function friendDetail(id){
  const f = _social && _social.friends && _social.friends.find(x => x.id === id);
  if(!f) return;
  const w = f.w|0, l = f.l|0, t = f.t|0, w7 = f.w7|0, l7 = f.l7|0, t7 = f.t7|0;
  const wk = w7 + l7 + t7;
  const weekLine = !wk ? `<span class="muted">no duels this past week</span>`
    : w7 > l7 ? `<b style="color:var(--good)">👑 you lead — ${w7}–${l7}${t7?` · ${t7} tie${t7===1?'':'s'}`:''}</b>`
    : l7 > w7 ? `<b style="color:var(--bad)">they lead — ${l7}–${w7}${t7?` · ${t7} tie${t7===1?'':'s'}`:''}</b>`
    : `<b>🤝 dead even — ${w7}–${l7}${t7?` · ${t7} tie${t7===1?'':'s'}`:''}</b>`;
  const ago = ts => { const d = Math.floor((Date.now()-ts)/864e5); return d<=0 ? "today" : d===1 ? "yesterday" : d+" days ago"; };
  const rows = (f.recent||[]).map(r => `<div style="font-size:13.5px; margin:5px 0">
      <span class="muted" style="font-size:12px">${ago(r.at)}</span> · you <b>${r.mine|0}/${RUN_LEN}</b> vs <b>${r.theirs|0}/${RUN_LEN}</b>
      ${r.r==='w' ? '🏆' : r.r==='l' ? `<span style="color:var(--bad)">✗</span>` : '🤝'}</div>`).join("");
  const sheet = document.getElementById("sheet");
  sheet.innerHTML = `
    <div class="winner-emoji">⚔️</div>
    <div class="verdict ${w >= l ? 'good' : 'bad'}" style="margin-top:6px">${esc(f.handle)}</div>
    <div style="font-size:15px; margin:8px 0 2px">all-time: <b>you ${w}–${l}</b>${t ? ` · ${t} tie${t===1?'':'s'}` : ``}</div>
    <div style="font-size:14px; margin:4px 0 10px">last 7 days: ${weekLine}</div>
    ${rows ? `<div style="border-top:1px solid var(--line); padding-top:8px; margin-top:4px">${rows}</div>`
           : `<div class="muted" style="font-size:13.5px; margin:8px 0">No duels yet — throw the first gauntlet!</div>`}
    <button class="btn pink" style="margin-top:14px" onclick="closeOverlay(); challengeFriend('${f.id}')">⚔️ Challenge ${esc(f.handle)}</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeOverlay()">Close</button>
  `;
  showSheet();
}

async function playInboxChal(id){
  const m = _social && _social.inbox && _social.inbox.find(x => x.id === id);
  if(!m) return;
  const idx = String(m.payload && m.payload.set || "").split(".").map(Number).filter(n => Number.isFinite(n) && n >= 0);
  if(idx.length < 2){ socialPost({ action:"seen", ids:[id] }); toast("This challenge can't be played on this version."); return; }
  const prev = chalPlayed(idx);
  if(prev){
    // one shot per set: this exact set was already played (e.g. the daily) —
    // report the recorded run as the duel result instead of dead-ending
    socialPost({ action:"result", id: m.id, score: prev.s, timeMs: prev.t||0 });
    socialPost({ action:"seen", ids:[id] });
    toast("You already played these songs — sent your "+prev.s+"/"+RUN_LEN+" back ⚔️");
    socialGet().then(st => { if(st) renderFriendsCard(st); });
    return;
  }
  // NOT marked seen here: if the start aborts (song resolution failed), the
  // challenge stays in the inbox for a retry — it's consumed on the results screen
  // msgId marks this as a friend's direct challenge: the result goes back through
  // the server automatically, so we never show a "share a link back" step for it
  S.challenge = { idx, beat: (m.payload.score != null ? m.payload.score : null), beatTime: m.payload.timeMs || null, msgId: m.id, fromHandle: m.handle };
  const from = { user: m.from, handle: m.handle, msgId: m.id };
  await startChallenge();
  S.reactTo = from;   // after startGame (which clears it) — offer a reaction on the results screen
}

function confettiBurst(){
  if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  let host = document.getElementById("confetti");
  if(host) host.remove();
  host = document.createElement("div"); host.id = "confetti";
  const colors = ["#FFC24B","#8CEBFF","#FF5C8A","#9D7BFF","#54E38E"];
  for(let i = 0; i < 80; i++){
    const p = document.createElement("i");
    p.style.left = (Math.random()*100) + "vw";
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.7 + Math.random()*1.4) + "s";
    p.style.animationDelay = (Math.random()*0.5) + "s";
    p.style.transform = "rotate(" + Math.floor(Math.random()*360) + "deg)";
    host.appendChild(p);
  }
  document.body.appendChild(host);
  setTimeout(()=>{ host.remove(); }, 3800);
}

function avatarFor(key, fallbackHandle){

function currentAvatarKey(){
  const a = store.get("tl_avatar") || "";

/* ---------- activity feed (local event log — no server persistence) ----------
   Everything feed-worthy already passes through the client: inbox messages
   (challenges/results/reactions/new friends), finished dailies, duel verdicts,
   and challenges you send. Log them into tl_feed (capped) as they happen —
   inbox items dedupe on their message id since they vanish once "seen". */
function loadFeed(){ try{ return JSON.parse(store.get("tl_feed")||"[]")||[]; }catch(e){ return []; } }
function logFeed(e){
  const f = loadFeed();
  if(e.id != null && f.some(x => x.id === e.id)) return;
  f.unshift({ ...e, t: Date.now() });
  store.set("tl_feed", JSON.stringify(f.slice(0, 30)));
}
function feedFromInbox(st){
  if(!st || !st.inbox) return;
  for(const m of st.inbox){
    if(m.kind === "challenge") logFeed({ id:m.id, k:"chal-in", who:m.handle, s:m.payload && m.payload.score });
    else if(m.kind === "friend") logFeed({ id:m.id, k:"friend", who:m.handle });
    else if(m.kind === "react") logFeed({ id:m.id, k:"react", who:m.handle, e:(m.payload && m.payload.emoji)||"👏" });
    else if(m.kind === "result") logFeed({ id:m.id, k:"result", who:m.handle, u:m.from, s:m.payload && m.payload.score, w:m.payload && m.payload.w, e:m.payload && m.payload.emoji });
  }
}
function fmtAgo(t){
  const s = (Date.now() - t) / 1000;
  if(s < 90) return "just now";
  if(s < 3600) return Math.round(s/60) + "m ago";
  if(s < 86400) return Math.round(s/3600) + "h ago";
  const d = Math.round(s/86400);
  return d <= 7 ? d + "d ago" : new Date(t).toLocaleDateString();
}

/* ---------- iTunes Search (JSONP — no key, no CORS hassle) ---------- */
let _jsonpN = 0;
function itunesSearch(term, limit){
  limit = limit || 8;
  return new Promise(resolve => {
    const cb = "itc_" + (++_jsonpN);
    const s = document.createElement("script");
    let done = false;
    const finish = (results) => { if(done) return; done = true; try{ delete window[cb]; }catch(e){ window[cb]=undefined; } s.remove(); clearTimeout(to); resolve(results||[]); };
    const to = setTimeout(()=> finish([]), 9000);
    window[cb] = data => finish((data && data.results) || []);
    s.onerror = () => finish([]);
    s.src = "https://itunes.apple.com/search?media=music&entity=song&limit="+limit
          +"&term="+encodeURIComponent(term)+"&callback="+cb;
    document.head.appendChild(s);
  });
}
function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }
function yearOf(releaseDate){ const y = parseInt(String(releaseDate||"").slice(0,4),10); return y||null; }
// pick the result that best matches the curated title/artist and has a playable preview
// karaoke / tribute / novelty versions often have wrong or silent previews
const BADVER = /karaoke|tribute|made famous|originally performed|as made popular|8[\- ]?bit|lullaby|meditation|piano tribute/i;
// compare on the CORE title: "(feat. …)" / "[Club Mix]" suffixes off. Apple's
// canonical track is often "Title (feat. X)", which never matched exactly and
// could tie with a DIFFERENT same-artist song whose short title is a substring
// (want "I Like to Move It": real "…(feat. The Mad Stuntman)" and other track
// "Move It!" both scored 1 — iTunes result order then decided the audio).
function coreNorm(s){
  return norm(String(s||"")
    .replace(/\(.*?\)|\[.*?\]/g, " ")                 // "(feat. X)" / "[Club Mix]"
    .replace(/\b(feat\.?|ft\.?|featuring)\b.*$/i, " ")); // unbracketed "feat. X" tails
}
function pickBest(results, song){
  const wantT = norm(song.title), wantA = norm(song.artist);
  const wantTC = coreNorm(song.title) || wantT;
  let best=null, bestScore=-1;
  for(const r of results){
    if(!r.previewUrl) continue;
    if(BADVER.test(r.artistName||"") || BADVER.test(r.collectionName||"")) continue;
    const t = norm(r.trackName), tc = coreNorm(r.trackName) || t, a = norm(r.artistName);
    let tScore = 0, aScore = 0;
    if(t===wantT || tc===wantTC) tScore = 3;
    else if(t.includes(wantT)||tc.includes(wantTC)) tScore = 1;             // result extends want: mixes/edits
    else if((wantT.includes(t)||wantTC.includes(tc)) && tc.length >= wantTC.length*0.7) tScore = 1;
    // reverse containment (result much SHORTER than want) is a wrong-song
    // vector — "Move It!" ⊂ "I Like to Move It" — so it needs ≥70% length
    if(a===wantA) aScore = 2; else if(a.includes(wantA)||wantA.includes(a)) aScore = 1;
    // BOTH must match at least partially — artist-only allowed wrong-song swaps.
    // Skipping is always better than playing the wrong song.
    if(tScore===0 || aScore===0) continue;
    // prefer releases from the curated era: original single/album beats a
    // "(2010 Mixes)" reissue or sped-up upload when the text scores tie
    const ry = yearOf(r.releaseDate);
    const yBonus = (ry && song.year && Math.abs(ry - song.year) <= 3) ? 1 : 0;
    const score = tScore + aScore + yBonus;
    if(score>bestScore){ bestScore=score; best=r; }
  }
  return best;
}

/* ---------- deck resolution ---------- */
function allDecks(){ return DECKS.concat(S.customDecks); }
function isSelected(id){ return S.selectedIds.indexOf(id) >= 0; }
// merged, de-duplicated song list across every selected deck
function selectedSongs(){
  const out = [], seen = new Set();
  for(const id of S.selectedIds){
    const d = allDecks().find(x => x.id===id);
    if(!d) continue;
    for(const s of d.songs){
      const k = norm(s.title)+"|"+norm(s.artist);
      if(seen.has(k)) continue;
      seen.add(k); out.push(s);
    }
  }
  return out;
}
// Progressive, throttled deck loading. We resolve a small first batch so the
// game can start, then trickle the rest in the background — both to start fast
// and to stay under Apple's request rate limit (bursting ~100 lookups at once
// gets most of them throttled to empty, which used to starve the deck).
let bgRun = 0;   // bumped each game; background loaders stop when it changes

/* ---------- connection watchdog ----------
   A bad connection should read as "reconnecting", not as a broken/stuck game.
   Signal = repeated empty lookups OR the browser reporting offline. A single
   good lookup clears it, so it never lingers once the network is back. */
let _netFails = 0;
function isOffline(){ return (typeof navigator!=="undefined" && navigator.onLine === false); }
function setNetTrouble(on){
  if(S.netTrouble === on) return;
  S.netTrouble = on;
  let el = document.getElementById("netbanner");
  if(!el && typeof document !== "undefined"){
    el = document.createElement("div"); el.id = "netbanner"; el.className = "netbanner";
    el.innerHTML = '<span class="netdot"></span> Connection trouble — reconnecting…';
    document.body.appendChild(el);
  }
  if(el) el.classList.toggle("show", on);
}
function noteLookup(ok){
  if(ok){ _netFails = 0; if(!isOffline()) setNetTrouble(false); }
  else if(++_netFails >= 3) setNetTrouble(true);   // 3 empties in a row (each already retried) = real trouble
}
if(typeof window !== "undefined"){
  window.addEventListener("offline", ()=> setNetTrouble(true));
  window.addEventListener("online",  ()=>{ _netFails = 0; setNetTrouble(false); });
}
async function resolveBatch(slice){
  const hits = await Promise.all(slice.map(async sg => {
    let res = [];
    try{ res = await itunesSearch(sg.artist+" "+sg.title, 10); }catch(e){}
    // empty usually means a network hiccup (timeout) on a flaky connection —
    // one retry recovers it; costs nothing when the first call already worked
    if(!res.length){ try{ res = await itunesSearch(sg.artist+" "+sg.title, 10); }catch(e){} }
    noteLookup(res.length > 0);   // feed the connection watchdog
    return { sg, hit: pickBest(res, sg) };
  }));
  let added = 0;
  for(const {sg,hit} of hits){
    if(hit && hit.previewUrl && !S.deckSeen.has(hit.trackId)){
      S.deckSeen.add(hit.trackId);
      const c = { id:"it"+hit.trackId, name:sg.title, artist:sg.artist, year:sg.year, previewUrl:hit.previewUrl,
                  view: /^https:\/\//.test(hit.trackViewUrl||"") ? hit.trackViewUrl : "" };   // Apple Music page, shown on reveals
      if(S.yearOverrides[c.id]) c.year = S.yearOverrides[c.id];
      S.deck.push(c); added++;
    }
  }
  return added;
}
// the first batch — must be ready before play; gentle but not slow
async function resolveInitial(list, onProgress, enough){
  const BATCH = 3;
  for(let i=0;i<list.length;i+=BATCH){
    await resolveBatch(list.slice(i, i+BATCH));
    if(onProgress) onProgress(Math.min(list.length, i+BATCH), list.length);
    if(enough && enough()) return Math.min(list.length, i+BATCH);   // got the minimum — start now
    await new Promise(r => setTimeout(r, 350));
  }
  return list.length;
}
// the rest — streamed in slowly while the game is played
async function loadRest(list, myRun){
  S.loadingMore = true;
  const BATCH = 2, DELAY = 2200;
  for(let i=0;i<list.length;i+=BATCH){
    // a newer game owns the flag now — dying loaders must NOT touch it, or
    // they'd kill the new game's starvation-wait mid-run (early "ran dry")
    if(bgRun !== myRun) return;
    await resolveBatch(list.slice(i, i+BATCH));
    // the deck may have been too thin to pre-pick a next card — retry now
    if(bgRun === myRun && !S.nextPick && S.current) primeNext();
    await new Promise(r => setTimeout(r, DELAY));
  }
  if(bgRun === myRun) S.loadingMore = false;
}

/* ---------- audio (30s preview clips) ---------- */
const aud = () => document.getElementById("aud");
// iOS unlocks an <audio> element only after play() is called inside a user gesture.
// Call this from the Start / Resume / Replay taps so the element is primed.
// a 0.05s silent WAV — playing this inside the tap unlocks the element even
// before the first real clip has loaded (the bug that muted the first game)
const SILENT = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
const reducedMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
/* live audio visualizer — real frequency analysis of the playing preview.
   Routing audio through Web Audio mutes cross-origin media unless the server
   sends CORS headers, so we probe once and only enable if it's safe; otherwise
   we keep the CSS-animated bars and playback is untouched. */
let audioCtx=null, srcNode=null, analyser=null, freqData=null, vizRAF=0, vizEnabled=false, corsChecked=false;
function initAudioCtx(){
  if(audioCtx) return audioCtx;
  try{ const AC = window.AudioContext||window.webkitAudioContext; if(AC) audioCtx = new AC(); }catch(e){}
  return audioCtx;
}
async function maybeEnableViz(url){
  if(vizEnabled || corsChecked || reducedMotion || !url) return;
  corsChecked = true;
  try{ await fetch(url, { mode:"cors" }); }catch(e){ return; }   // no CORS → keep CSS bars, never touch WebAudio
  const a = aud(), ctx = initAudioCtx();
  if(!a || !ctx || srcNode) return;
  try{
    a.crossOrigin = "anonymous";
    analyser = ctx.createAnalyser(); analyser.fftSize = 64; analyser.smoothingTimeConstant = 0.75;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    srcNode = ctx.createMediaElementSource(a);   // one-way — only done after CORS is confirmed
    srcNode.connect(analyser); analyser.connect(ctx.destination);
    vizEnabled = true;
    if(ctx.state==="suspended") ctx.resume();
    a.load(); a.play().catch(()=>{});            // reload current clip CORS-clean so it keeps sound
    if(S.playing) startViz();
  }catch(e){ vizEnabled=false; }
}
function vizLoop(){
  vizRAF = 0;
  const eq = document.querySelector('.eq');
  const bars = eq ? eq.querySelectorAll('span') : [];
  if(!analyser || !bars.length || !S.playing) return;   // stop; restarts on next 'playing'
  if(!eq.classList.contains('viz')) eq.classList.add('viz');   // ensure the CSS keyframes are off
  analyser.getByteFrequencyData(freqData);
  const bins = [1,3,5,8,12];
  for(let i=0;i<bars.length;i++){
    const v = freqData[bins[i]] || 0;
    bars[i].style.height = (8 + (v/255)*26).toFixed(1) + "px";
  }
  vizRAF = requestAnimationFrame(vizLoop);
}
function startViz(){ if(!vizEnabled || reducedMotion || vizRAF) return; vizRAF = requestAnimationFrame(vizLoop); }
function stopViz(){ if(vizRAF){ cancelAnimationFrame(vizRAF); vizRAF=0; } const eq=document.querySelector('.eq'); if(eq) eq.querySelectorAll('span').forEach(s=>s.style.height='9px'); }

let audioUnlocked = false;   // once the element has really played, it stays unlocked for the session
function unlockAudio(){
  const a = aud(); if(!a) return;
  try{ const c=initAudioCtx(); if(c && c.state==="suspended") c.resume(); }catch(e){}   // must resume in a gesture
  // Already unlocked (or actively playing)? Don't run the silent-WAV dance: its
  // deferred pause() would race a playClip() issued in the same tap and silence
  // the brand-new clip (bug: only the first track played after the handoff merge).
  if(audioUnlocked || !a.paused) return;
  try{
    if(!a.src){ a.src = SILENT; }      // no real clip yet → unlock with silence
    a.muted = true;
    const p = a.play();
    // deferred pause must NEVER touch a real clip: only silence gets paused
    // (a fast deck load could otherwise land this pause on the first track)
    const settle = ()=>{ audioUnlocked = true; if(a.src === SILENT){ a.pause(); a.currentTime = 0; } a.muted = false; };
    if(p && p.then) p.then(settle).catch(()=>{ a.muted = false; });
    else settle();
  }catch(e){ a.muted=false; }
}
function maskMediaSession(){
  if(!("mediaSession" in navigator)) return;
  try{
    navigator.mediaSession.metadata = new MediaMetadata({ title:"🎵 Yearworm", artist:"guess the year", album:"" });
  }catch(e){}
}
function playClip(card){
  const a = aud(); if(!a || !card) return;
  wireAudio();
  S.buffering = false; syncBuffer();
  try{
    if(vizEnabled) a.crossOrigin = "anonymous";   // keep clips CORS-clean once routed through WebAudio
    if(a.src !== card.previewUrl){ a.src = card.previewUrl; }
    a.currentTime = 0;
    const p = a.play();
    if(p && p.catch) p.catch(()=>{ S.playing=false; syncEq(); /* gesture needed — the ▶ Play button starts it */ });
    S.playing = true;
    maskMediaSession();
    maybeEnableViz(card.previewUrl);              // one-time: enable the live visualizer if CORS allows
  }catch(e){ S.playing = false; }
}
// keep the equalizer honest without a full re-render
function syncEq(){
  const eq=document.querySelector('.eq'); if(eq) eq.classList.toggle('paused', !S.playing);
  const b=document.getElementById('ppBtn'); if(b) b.innerHTML = S.playing ? '❚❚&nbsp; Pause' : '▶&nbsp; Play';
}
// the clip is stalling to buffer — say so, so stutter reads as "loading" not "broken"
function syncBuffer(){
  const n=document.getElementById('bufNote'); if(n) n.classList.toggle('show', !!S.buffering && !S.checkingTrack);
}
// some iTunes previews are broken/silent — detect the load failure and move on
let autoSkips = 0;
function wireAudio(){
  const a = aud(); if(!a || a._wired) return; a._wired = true;
  a.addEventListener('playing', ()=>{ audioUnlocked=true; autoSkips=0; S.playing=true; S.buffering=false; syncEq(); syncBuffer(); startViz(); });
  a.addEventListener('pause',   ()=>{ S.playing=false; syncEq(); stopViz(); });
  a.addEventListener('waiting', ()=>{ S.buffering=true; syncBuffer(); });
  a.addEventListener('stalled', ()=>{ S.buffering=true; syncBuffer(); });
  a.addEventListener('error',   onAudioFail);
}
function onAudioFail(){
  const a = aud();
  if(!S.current || !S.players || !S.players.length) return;
  if(!a || a.src !== S.current.previewUrl) return;   // ignore stale / silent-unlock errors
  // a media error while an overlay is up (reveal/results — the clip loops under
  // it) must NOT skip: the card is already placed, and skipTrack would splice a
  // legitimately-played song out of S.runCards and double-advance the turn
  const ov = document.getElementById("overlay");
  if(ov && ov.classList.contains("show")){ try{ a.pause(); }catch(e){} return; }
  if(++autoSkips > 6){ autoSkips=0; showError("Several previews wouldn't load — Apple may be rate-limiting. Wait a few seconds, then tap ▶ Play."); return; }
  toast("Couldn't load that clip — skipping.");
  skipTrack();
}
// auto-skip a broken preview — same player gets a fresh track; no score change.
// (the manual Skip button was removed: curated decks + the 🚩 report flow cover it)
function skipTrack(){
  if(!S.current) return;
  buzz(6);
  S.used.add(S.current.id);   // don't offer this one again
  if(S.runCards && S.runCards.length){
    // the dead song must not stay in the shared challenge link — the sender
    // never actually played it, and it would push a real song past RUN_LEN+1
    const i = poolIndexOf(S.current);
    const at = i >= 0 ? S.runCards.lastIndexOf(i) : -1;
    if(at >= 0) S.runCards.splice(at, 1);
  }
  nextTurn();
}
// one toggle covers everything: resume after pause, AND the manual recovery
// path when mobile blocked autoplay (call/notification/first-gesture cases)
function togglePlay(){
  if(!S.current) return;
  const a = aud();
  if(a && !a.paused){ a.pause(); S.playing=false; renderGame(); return; }
  unlockAudio(); playClip(S.current); renderGame();
}

/* ---------- game logic ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function drawCard(){
  // a pre-picked (and pre-buffered) card wins, if it's still playable
  if(S.nextPick && !S.used.has(S.nextPick.id) && !inAnyTimeline(S.nextPick.id)){
    const c = S.nextPick; S.nextPick = null; return c;
  }
  const avail = S.deck.filter(c => !S.used.has(c.id) && !inAnyTimeline(c.id));
  if(avail.length===0) return null;
  if(S.mode==="daily" || S.mode==="challenge") return avail[0];   // deck order IS the seeded order
  return avail[Math.floor(Math.random()*avail.length)];
}
// pick next turn's card NOW and warm its clip in the hidden preloader, so the
// turn handoff doesn't start with a cold download (noticeable in pass & play)
function primeNext(){
  const cur = S.current && S.current.id;
  const avail = S.deck.filter(c => !S.used.has(c.id) && !inAnyTimeline(c.id) && c.id !== cur);
  S.nextPick = !avail.length ? null
    : (S.mode==="daily" || S.mode==="challenge") ? avail[0]
    : avail[Math.floor(Math.random()*avail.length)];
  const p = document.getElementById("pre");
  if(p && S.nextPick && p.src !== S.nextPick.previewUrl){
    try{ p.src = S.nextPick.previewUrl; p.load(); }catch(e){}
  }
}
function inAnyTimeline(id){ return S.players.some(p => p.timeline.some(c => c.id===id)); }

/* ---------- save / resume (survives crashes & reloads) ---------- */
function saveGame(){
  try{
    if(S.mode==="daily" || S.mode==="challenge" || S.turbo) return;   // 3-minute runs aren't worth resuming
    if(!S.players || !S.players.length) return;
    store.set("tl_game", JSON.stringify({
      v:2, target:S.target, turn:S.turn, deck:S.deck, used:[...S.used],
      current:S.current, players:S.players.map(p=>({name:p.name, timeline:p.timeline, timeMs:p.timeMs||0})),
      mode:S.mode, lives:S.lives, score:S.score, streak:S.streak, bestStreak:S.bestStreak,
      sel:S.selectedIds   // lets resume restart the background deck loader
    }));
  }catch(e){}
}
function clearGame(){ store.del("tl_game"); }
function loadSaved(){ try{ return JSON.parse(store.get("tl_game")||"null"); }catch(e){ return null; } }
function hasSavedGame(){
  const d = loadSaved();
  return !!(d && d.players && d.players.length && (d.current || d.players.some(p=>(p.timeline||[]).length>1)));
}
function savedSummary(){
  const d = loadSaved(); if(!d) return "in progress";
  if(d.mode==="survival"){
    const hearts = "❤️".repeat(Math.max(0, d.lives||0)) || "💀";
    return "Survival — "+(d.score||0)+" placed · "+hearts;
  }
  const lead = [...(d.players||[])].sort((a,b)=>(b.timeline||[]).length-(a.timeline||[]).length)[0];
  return lead ? esc(lead.name)+" leading ("+(lead.timeline||[]).length+"/"+(d.target||"?")+")" : "in progress";
}
function discardSaved(){ clearGame(); renderSetup(); }
function resumeSaved(){
  const d = loadSaved();
  if(!d){ toast("No saved game to resume."); return; }
  S.target = d.target||S.target;
  S.turn = d.turn||0;
  S.deck = d.deck||[];
  S.used = new Set(d.used||[]);
  S.current = d.current||null;
  S.players = (d.players||[]).map(p=>({name:p.name||"Player", timeline:p.timeline||[], timeMs:p.timeMs||0}));
  S.mode = d.mode || "classic";
  S.turbo = false;               // saved games are classic/survival — a turbo chip
                                 // toggled while browsing setup must not leak in
  S.nextPick = null;             // a card primed by a DIFFERENT run must not be dealt here
  S.turnStart = Date.now();      // …nor should another game's clock bill this player up to 60s
  S.lives = (typeof d.lives==="number") ? d.lives : 0;
  S.score = d.score||0; S.streak = d.streak||0; S.bestStreak = d.bestStreak||0;
  if(d.sel && d.sel.length) S.selectedIds = d.sel;
  // rebuild the duplicate guard from what's already resolved, then restart the
  // background loader — without it a resumed game "runs dry" long before target
  const resolved = [...S.deck, ...S.players.flatMap(p=>p.timeline)];
  S.deckSeen = new Set(resolved.map(c=>Number(String(c.id).replace(/^it/,""))).filter(Number.isFinite));
  const myRun = ++bgRun;
  S.loadingMore = false;
  const have = new Set(resolved.map(c=>((c.name||"")+"|"+(c.artist||"")).toLowerCase()));
  const rest = selectedSongs().filter(sg => !have.has(((sg.title||"")+"|"+(sg.artist||"")).toLowerCase()));
  if(rest.length){ shuffle(rest); loadRest(rest, myRun); }
  unlockAudio();                 // this is a user tap → unlocks mobile audio
  renderGame();
  if(S.current) playClip(S.current);
}

function startGame(){
  bgRun++;   // invalidate any background loader from a previous game
  S.reactTo = null;   // reactions only belong to a run started from the inbox
  S.chalTarget = null; // auto-send only belongs to a run started via a friend's ⚔️
  S.nextPick = null;   // pre-buffered card belongs to the previous game's deck
  if(S.mode!=="daily" && S.mode!=="challenge") shuffle(S.deck);   // seeded runs: the order IS the puzzle
  if(isRun()){
    // runs play on ONE shared timeline: a single neutral anchor, and every
    // player's locked cards land on the same board (colored per player)
    const c = drawCard();
    const board = [];
    if(c){ S.used.add(c.id); c.owner = -1; c.wrong = false; board.push(c); }   // deck cards are reused across replays — clear a stale miss flag
    S.players.forEach(p => { p.timeline = board; });   // same array reference
  } else {
    // classic/survival: seed each player their own freebie reference card
    S.players.forEach(p=>{
      p.timeMs = 0;
      const c = drawCard();
      if(c){ S.used.add(c.id); c.wrong = false; p.timeline = [c]; }
    });
  }
  S.turn = 0;
  if(S.mode==="survival"){ S.lives = 3; S.score = 0; S.streak = 0; S.bestStreak = 0; }
  if(isRun()){
    S.players.forEach(pl => { pl.tries = 0; pl.hits = 0; pl.results = []; pl.timeMs = 0; });
    S.runLog = [];   // per-song recap for the results screen (name/year/ok, in play order)
    // track pool indices for challenge links (solo runs only; null = unencodable)
    S.runCards = null;
    if(S.players.length===1 && S.players[0].timeline[0]){
      const ai = poolIndexOf(S.players[0].timeline[0]);
      S.runCards = ai>=0 ? [ai] : null;
    }
  }
  nextTurn();
  renderGame();
  saveGame();
}

async function nextTurn(){
  const myRun = bgRun;   // quitting (or a new game) invalidates this turn's wait loop
  S.pendingSlot = null;
  S.checkingTrack = false;
  S.checkMessage = "";
  S.current = null;   // no stale card while we draw/wait — otherwise the slots stay
                      // tappable and a tap "re-places" last turn's card (ghost turn)
  let c = drawCard();
  if(!c && (S.loadingMore || S.netTrouble || isOffline())){
    // no card ready — the loader is still fetching, or the connection dropped.
    // Wait it out rather than ending the game; stay patient while we're offline
    // (the clip loops, nobody's missing anything) and resume the moment a card
    // lands or the network returns.
    S.checkingTrack = true; renderGame();
    for(let t=0; !c; t++){
      if(bgRun !== myRun) return;   // the game was quit/replaced mid-wait
      const offline = S.netTrouble || isOffline();
      S.checkMessage = offline ? "Waiting for connection…" : "Loading more songs…";
      if(document.querySelector('.verify-state') && document.querySelector('.stage h2'))
        document.querySelector('.stage p').textContent = S.checkMessage;
      else renderGame();
      await new Promise(r => setTimeout(r, 400));
      c = drawCard();
      // give up only when the loader is done AND the browser isn't hard-offline:
      // ~24s of grace when clean, ~60s when the lookup watchdog flagged trouble
      // (rate-limiting can set netTrouble while online — that must not wait forever)
      if(!c && !S.loadingMore && !isOffline() && t >= (S.netTrouble ? 150 : 60)) break;
    }
    S.checkingTrack = false; S.checkMessage = "";
  }
  if(bgRun !== myRun) return;
  if(!c){
    if(isRun()){ overlayRunOver(); return; }   // ran dry mid-run: score what we have
    overlayGameOver(true); return;
  }
  S.current = c;
  S.turnStart = Date.now();   // run tiebreaker: thinking time from clip start to placement
  if(isRun() && S.runCards && S.players.length===1){
    const i = poolIndexOf(c);
    S.runCards = i>=0 ? [...S.runCards, i] : null;   // null: contains a song outside the shared pool
  }
  saveGame();
  renderGame();
  playClip(c);
  renderGame();
  primeNext();   // after the live clip's request is on its way
}

function sortedTimeline(p){ return [...p.timeline].sort((a,b)=>a.year-b.year); }
function slotCorrect(p, idx){
  const tl = sortedTimeline(p).filter(c => c.id !== S.current.id);
  const y = S.current.year;
  const left = idx>0 ? tl[idx-1].year : -Infinity;
  const right = idx<tl.length ? tl[idx].year : Infinity;
  return y >= left && y <= right;   // inclusive — same-year is correct on either side
}
/* haptics — a non-visual feedback cue (good on mobile + for accessibility) */
function buzz(pattern){ try{ if("vibrate" in navigator) navigator.vibrate(pattern); }catch(e){} }
/* where the card actually belonged, for "you missed" feedback */
function correctRange(p, c){
  const yrs = sortedTimeline(p).filter(x => x.id !== c.id).map(x => x.year);
  let left=null, right=null;
  for(const y of yrs){ if(y < c.year) left = y; }                 // largest strictly-less
  for(const y of yrs){ if(y > c.year){ right = y; break; } }      // smallest strictly-greater
  if(left===null && right===null) return "";
  if(left===null) return `before ${right}`;
  if(right===null) return `after ${left}`;
  return `between ${left} & ${right}`;
}
function showCheckingState(message){
  S.checkingTrack = true;
  S.checkMessage = message || "Checking track…";
  closeOverlay();
  renderGame();
}
function chooseSlot(idx){
  if(!S.current) return;
  const p = S.players[S.turn];
  S.pendingSlot = idx;
  buzz(8);                                  // confirm the tap landed
  const correct = slotCorrect(p, idx);      // instant — no fake "checking" delay
  const run = isRun();
  // classic/survival: only correct cards stay. Runs: EVERY card locks at its
  // true year (right or wrong) so the board densifies and the run gets harder.
  if(run){ S.current.owner = S.turn; S.current.wrong = !correct; }   // colors the shared board; misses lock in red
  if((correct || run) && !p.timeline.some(c => c.id === S.current.id)){
    p.timeline.push(S.current);
    p.timeline.sort((a,b)=>a.year-b.year);
  }
  if(S.mode==="survival"){
    if(correct){ S.score++; S.streak++; if(S.streak>S.bestStreak) S.bestStreak = S.streak; }
    else { S.lives--; S.streak = 0; }
  }
  p.timeMs = (p.timeMs||0) + turnElapsed();
  if(run){ p.tries=(p.tries||0)+1; (p.results=p.results||[]).push(!!correct); if(correct) p.hits=(p.hits||0)+1;
    (S.runLog = S.runLog||[]).push({ name:S.current.name, artist:S.current.artist, year:S.current.year, ok:!!correct }); }
  S.used.add(S.current.id);
  bumpLife("cards");                        // lifetime cards-placed counter
  buzz(correct ? 18 : [0,45,45,45]);        // crisp tick vs penalty buzz-buzz
  saveGame();
  if(run) recordRunProgress();   // one-shot sets burn from the first reveal on
  // last placement of a run: skip the in-between reveal — the results screen
  // carries the final song's reveal line itself (one screen, not two)
  if(run && S.players.every(pl => (pl.tries||0) >= RUN_LEN)){
    S.lastReveal = { correct, id:S.current.id, year:S.current.year, name:S.current.name, artist:S.current.artist };
    overlayRunOver();
    return;
  }
  overlayReveal(correct, p);
}
function advance(){
  closeOverlay();
  const p = S.players[S.turn];
  if(isRun()){
    if(S.players.every(pl => (pl.tries||0) >= RUN_LEN)){ overlayRunOver(); return; }
    do{ S.turn = (S.turn+1) % S.players.length; } while((S.players[S.turn].tries||0) >= RUN_LEN);
    unlockAudio();
    nextTurn();
    return;
  }
  if(S.mode==="survival"){
    if(S.lives <= 0){ overlayGameOver(false, p); return; }
    nextTurn();   // same solo player keeps going — endless until out of lives
    return;
  }
  // fair race: someone reaching the target doesn't end the game while a later
  // player this round can still tie (they're one card short). Hopeless final
  // turns are skipped; card-ties are broken by total thinking time.
  const someoneFinished = S.players.some(pl => pl.timeline.length >= S.target);
  if(someoneFinished){
    if(raceOver()){ overlayGameOver(false); return; }
    do{ S.turn++; } while(S.players[S.turn].timeline.length !== S.target-1);   // next player who can still tie
  } else {
    S.turn = (S.turn+1) % S.players.length;
  }
  unlockAudio();   // this tap is a fresh user gesture — re-primes audio for the new turn
  nextTurn();      // clip loops, so nothing is missed while the phone is handed over
}

/* ---------- rendering ---------- */
const app = () => document.getElementById("app");
function val(id){ const el=document.getElementById(id); return el?el.value:""; }
function esc(s){ return (s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
// every overlay goes through here: dialog semantics + focus land in the sheet

let toastTimer;

// the tally / recommendation line under the deck picker (updated in place on toggle)
function tallyHTML(){

// page the decks into side-scrollable groups of 6 (2 cols × 3 rows)
function deckCarouselHTML(){

  const cards = pages.map(pg => `<div class="deck-page">${pg.map(d=>deckChipHTML(d)).join("")}</div>`).join("");
  const dots = pages.length>1
    ? `<div class="car-dots" id="carDots">${pages.map((_,i)=>`<span class="car-dot ${i===0?'on':''}"></span>`).join("")}</div>` : ``;

function syncDots(){
  const car=document.getElementById("deckCar"), dots=document.getElementById("carDots");
  if(!car||!dots||!car.clientWidth) return;
  const page = Math.round(car.scrollLeft / car.clientWidth);
  [...dots.children].forEach((d,i)=>d.classList.toggle("on", i===page));
}
/* ===== 4.0 lobby: renderSetup is a tab router ===== */
function renderSetup(){

// the spinning-vinyl wordmark header, shared by lobby tabs
function lobbyHeadHTML(){
  // identity now lives on the Profile tab — no top-right name chip

// incoming/own/result challenge card for the Play home (preserves the link flow)
function challengeCardHTML(){
  if(!S.challenge) return "";
  if(S.challenge.beat != null){
    const mine = chalPlayed(S.challenge.idx);
    const ownEcho = mine && mine.m && S.challenge.beat === mine.s
      && (S.challenge.beatTime == null || S.challenge.beatTime === Math.round((mine.t||0)/1000)*1000);
    if(mine && !ownEcho){
      const tS = S.challenge.beat, tT = S.challenge.beatTime;
      const both = `their <b style="color:var(--text)">${tS}/${RUN_LEN}</b>${tT?` ⏱ ${fmtTime(tT)}`:``} vs your <b style="color:var(--text)">${mine.s}/${RUN_LEN}</b>${mine.t?` ⏱ ${fmtTime(mine.t)}`:``}`;
      let icon, line;
      if(tS > mine.s){ icon="😤"; line=`They beat you — ${both}.`; }
      else if(tS < mine.s){ icon="🏆"; line=`You're still on top — ${both}.`; }
      else if(tT && mine.t && tT !== Math.round((mine.t||0)/1000)*1000){
        icon = tT < mine.t ? "😤" : "🏆";
        line = `Tie on cards, ${tT < mine.t ? "they were faster" : "you were faster"} — ${both}.`;
      } else { icon="🤝"; line=`Dead even — ${both}.`; }
      return `<div class="card" style="border-color:var(--violet)">
        <div class="eyebrow" style="color:var(--violet)">🏁 challenge result ${icon}</div>
        <div class="muted" style="font-size:13.5px; margin-top:4px">${line}</div>
        ${S.challenge.msgId ? `<div style="color:var(--good); font-size:12.5px; margin-top:4px">✓ Result sent back to ${esc(S.challenge.fromHandle || 'your friend')}</div>` : ``}

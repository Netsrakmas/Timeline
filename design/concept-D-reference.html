class Component extends DCLogic {
  state = {

    song: null,

  shuffle(a) { a = a.slice(); for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  seededRand(seed) { const x = Math.sin(seed) * 10000; return x - Math.floor(x); }
  dailyPicks() {
    const day = Math.floor(Date.now() / 86400000);
    return SONGS.map((s,i) => ({ s, r: this.seededRand(day*97 + i*13 + 1) }))
      .sort((a,b) => a.r - b.r).slice(0, 6).map(o => o.s);
  }
  openChallenge = () => this.setState({ screen: "challengeintro",
    challenger: { name:"Priya", avatar:"🦊", score:4 } });

    const picks = this.shuffle(SONGS).slice(0, 6);
    const anchor = picks[0];
    const queue = picks.slice(1);
    const player = { name: "You", medal: "⚔️", timeline: [{ ...anchor }] };
    this.setState({ screen:"game", mode:"challenge", challengeDir: dir || "incoming", players:[player], cur:0,

      phase:"listening", playing:true, result:null, winner:null, dailyResults:[], shared:false });
  };
  startOutgoing = (friend) => { this.setState({ outgoingTarget: friend }); this.startChallenge("outgoing"); };
  startIncoming = () => this.startChallenge("incoming");
  startDaily = () => {
    const picks = this.dailyPicks();
    const anchor = picks[0];
    const queue = picks.slice(1); // 5 to place, fixed order
    const player = { name: "You", medal: "📅", timeline: [{ ...anchor }] };
    this.setState({ screen:"game", mode:"daily", players:[player], cur:0,
      song: queue[0], pool: queue.slice(1).reverse(),
      phase:"listening", playing:true, result:null, winner:null, dailyResults:[], shared:false });
  };
  shareDaily = () => this.setState({ shared: true });
  startSurvival = () => {
    const pool = this.shuffle(SONGS);
    const player = { name: "You", medal: "🎯", timeline: [pool.pop()] };
    this.setState({ screen:"game", mode:"survival", players:[player], cur:0,
      song: pool.pop(), pool, phase:"listening", playing:true, result:null, winner:null,
      lives:3, streak:0, bestStreak:0, placed:0 });
  };
  goTab = (name) => this.setState({ screen: name });
  copyInvite = () => this.setState({ invited: true });
  linkGoogle = () => this.setState({ googleLinked: true });
  colors() { return THEMES[this.props.accentTheme] || THEMES["Amber & Cyan"]; }

  goHome = () => this.setState({ screen: "home", players: [], winner: null });

  addPlayer = () => this.setState(s => s.setupNames.length >= 6 ? s : ({ setupNames: [...s.setupNames, "Player " + (s.setupNames.length+1)] }));
  removePlayer = (i) => this.setState(s => ({ setupNames: s.setupNames.filter((_,k)=>k!==i) }));
  setName = (i, v) => this.setState(s => ({ setupNames: s.setupNames.map((n,k)=>k===i?v:n) }));
  setTarget = (n) => this.setState({ target: n });

  startGame = () => {
    const pool = this.shuffle(SONGS);
    const players = this.state.setupNames.map((name,i) => ({
      name: (name||"").trim() || ("Player " + (i+1)),
      medal: MEDALS[i % MEDALS.length],
      timeline: [pool.pop()],
    }));
    players.forEach(p => p.timeline.sort((a,b)=>a.year-b.year));
    this.setState({ screen:"game", players, pool, cur:0, song: pool.pop(), phase:"listening", playing:true, result:null, winner:null });
  };

    if (this.state.phase !== "listening") return;

    const years = p.timeline.map(c=>c.year);
    const y = this.state.song.year;
    let lo=0; while (lo<years.length && years[lo] < y) lo++;
    let hi=lo; while (hi<years.length && years[hi] === y) hi++;
    const correct = gapIdx >= lo && gapIdx <= hi;
    this.setState({ phase:"revealed", playing:false, result:{ correct, lo, hi, guess: gapIdx } });
  };

      const correct = !!(st.result && st.result.correct);
      let { lives, streak, bestStreak, placed } = st;
      if (correct) {
        players[0].timeline.push({ ...st.song, justPlaced:true });
        players[0].timeline.sort((a,b) => a.year - b.year);
        streak += 1; placed += 1; bestStreak = Math.max(bestStreak, streak);
      } else {
        lives -= 1; streak = 0;
      }
      if (lives <= 0) { this.setState({ players, lives, streak, bestStreak, placed, screen:"over" }); return; }
      let pool = st.pool.slice();
      if (pool.length === 0) pool = this.shuffle(SONGS.filter(s => !players[0].timeline.some(c => c.title===s.title)));
      const song = pool.pop();
      this.setState({ players, lives, streak, bestStreak, placed, song, pool, phase:"listening", playing:true, result:null, flagged:false });
      return;
    }
    if (st.mode === "daily" || st.mode === "challenge") {
      const players = st.players.map(p => ({ ...p, timeline: p.timeline.slice() }));
      const p = players[0];
      p.timeline = p.timeline.map(c => ({ ...c, justPlaced:false }));
      p.timeline.push({ ...st.song, justPlaced:true, wrong: !(st.result && st.result.correct) }); // always locks at true year
      p.timeline.sort((a,b) => a.year - b.year);
      const dailyResults = [...st.dailyResults, !!(st.result && st.result.correct)];
      if (dailyResults.length >= 5) { this.setState({ players, dailyResults, screen:"over" }); return; }

    let pool = st.pool.slice();
    if (pool.length === 0) pool = this.shuffle(SONGS.filter(s => !players.some(p => p.timeline.some(c => c.title===s.title))));
    const nextCur = (st.cur + 1) % players.length;
    // strip justPlaced from the player who just went, next turn
    players[st.cur].timeline = players[st.cur].timeline.map(c => ({...c, justPlaced:false}));

        shareDaily: this.shareDaily, playAgain: this.openChallengeSend };
    }

    if (screen === "over" && s.mode === "survival") {
      const isPB = s.placed >= 9;
      return { ...base,
        survPlaced: s.placed, survBest: s.bestStreak,
        survPB: isPB ? "🎉 New personal best!" : "Personal best: 12 cards",
        playAgain: this.startSurvival };
    }

    if (screen === "over" && s.mode === "daily") {
      const score = s.dailyResults.filter(Boolean).length;
      const picks = this.dailyPicks();
      const placed = picks.slice(1); // the 5 that were placed, in order
      const dailyGrid = React.createElement("div", { style:{ display:"flex", gap:"9px" } },
        s.dailyResults.map((ok,i) => React.createElement("div", { key:i, style:{
          width:"34px", height:"34px", borderRadius:"9px", fontSize:"18px",
          display:"flex", alignItems:"center", justifyContent:"center",
          background: ok ? "rgba(74,222,128,.16)" : "rgba(255,107,107,.16)",
          border: `2px solid ${ok ? "#4ade80" : "#ff6b6b"}` } }, ok ? "🟩" : "🟥")));
      const dailyRecap = placed.map((song,i) => {
        const ok = s.dailyResults[i];
        return { icon: ok ? "🟩" : "🟥", year: song.year, title: song.title,
          border: ok ? "rgba(74,222,128,.3)" : "rgba(255,107,107,.3)",
          bg: ok ? "rgba(74,222,128,.07)" : "rgba(255,107,107,.07)" };
      });
      const verdicts = ["Tough one — back tomorrow.","Not your day.","Halfway there.","So close!","Almost flawless!","Perfect round! 🎉"];
      const dailyConfetti = score >= 4 ? React.createElement("div", { style:{ position:"absolute", inset:0, overflow:"hidden", pointerEvents:"none" } },
        Array.from({length:20}, (_,i) => React.createElement("div", { key:i, style:{
          position:"absolute", top:0, left:`${(i*5)%100}%`, width:"9px", height:"14px", borderRadius:"2px",
          background: [c.a, c.b, "#4ade80", "#a78bfa"][i%4],
          animation: `yw-fall ${2 + (i%5)*0.4}s ease-in ${(i%7)*0.2}s infinite` }}))) : null;
      return { ...base,
        dailyScore: score, dailyVerdict: verdicts[score], dailyGrid, dailyRecap, dailyConfetti,
        dailyStreak: s.dailyStreak + 1,
        shareLabel: s.shared ? "✓ Copied result" : "Share result",
        shareDaily: this.shareDaily, playAgain: this.startDaily };
    }

    if (screen === "over") {
      const sorted = s.players.slice().sort((a,b)=>b.timeline.length-a.timeline.length);
      const finalStandings = sorted.map((p,i) => ({
        medal: MEDALS[i], name: p.name, count: p.timeline.length,
        border: i===0 ? c.a : "rgba(255,255,255,.08)",
        bg: i===0 ? "rgba(246,185,59,.1)" : "rgba(255,255,255,.03)",
      }));
      const confetti = React.createElement("div", { style:{ position:"absolute", inset:0, overflow:"hidden", pointerEvents:"none" } },
        Array.from({length:24}, (_,i) => React.createElement("div", { key:i, style:{
          position:"absolute", top:0, left:`${(i*4.2)%100}%`,
          width:"9px", height:"14px", borderRadius:"2px",
          background: [c.a, c.b, "#ff6b6b", "#a78bfa"][i%4],
          animation: `yw-fall ${2 + (i%5)*0.4}s ease-in ${(i%7)*0.2}s infinite`,
        }})));
      return { ...base, winnerName: s.winner ? s.winner.name : "", finalStandings, playAgain: this.playAgain, confetti };
    }

    return base;
  }
}
</script>
